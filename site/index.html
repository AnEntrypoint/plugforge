<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gm: State machine for coding agents</title>
  <meta name="description" content="gm enforces a strict work cycle on every coding task: plan unknowns, execute against real services, emit after validation, verify, complete clean. Runs on Claude Code, Gemini CLI, OpenCode, Kilo, Codex, Copilot, VS Code, Cursor, Zed, and JetBrains.">
  <meta name="keywords" content="agentic coding, coding agent, Claude Code plugin, Gemini CLI plugin, immutable programming, state machine, gm agent, gm skill, lang plugin, webjsx">
  <meta name="author" content="AnEntrypoint">
  <link rel="canonical" href="https://anentrypoint.github.io/plugforge/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://anentrypoint.github.io/plugforge/">
  <meta property="og:title" content="gm: State machine for coding agents">
  <meta property="og:description" content="A state machine that keeps coding sessions on track. Plan unknowns, execute against real services, verify output, complete clean. 12 platforms.">
  <meta property="og:image" content="https://anentrypoint.github.io/plugforge/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://anentrypoint.github.io/plugforge/">
  <meta name="twitter:title" content="gm: State machine for coding agents">
  <meta name="twitter:description" content="A state machine that keeps coding sessions on track. Plan unknowns, execute against real services, verify output, complete clean. 12 platforms.">
  <meta name="twitter:image" content="https://anentrypoint.github.io/plugforge/og-image.png">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="stylesheet" href="./styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #c8c8d4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
    }
    code, pre, .mono {
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace;
      font-size: 13px;
    }
    ::selection { background: #d4845e; color: #1a1a2e; }
    a { color: inherit; text-decoration: none; }

    .cc-nav {
      border-bottom: 1px solid #2a2a40;
      padding: 10px 0;
      position: sticky;
      top: 0;
      background: #16162a;
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    .cc-nav-inner {
      max-width: 840px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cc-logo {
      color: #d4845e;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
    }
    .cc-nav-links { display: flex; gap: 20px; }
    .cc-nav-link { color: #8888a0; font-size: 14px; transition: color 0.15s; }
    .cc-nav-link:hover { color: #d4845e; }

    .cc-wrap {
      max-width: 840px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .cc-hero {
      padding: 64px 0 48px;
      border-bottom: 1px solid #2a2a40;
    }
    .cc-hero h1 {
      font-size: 42px;
      font-weight: 700;
      color: #ededf0;
      letter-spacing: -1px;
      margin-bottom: 12px;
      line-height: 1.15;
    }
    .cc-hero h1 span { color: #d4845e; }
    .cc-hero-sub {
      color: #8888a0;
      font-size: 17px;
      max-width: 560px;
      margin-bottom: 28px;
    }
    .cc-hero-actions { display: flex; gap: 12px; }
    .cc-btn-primary {
      background: #d4845e;
      color: #1a1a2e;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.15s;
    }
    .cc-btn-primary:hover { background: #e8927c; }
    .cc-btn-ghost {
      border: 1px solid #3a3a50;
      color: #c8c8d4;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 14px;
      transition: border-color 0.15s;
    }
    .cc-btn-ghost:hover { border-color: #d4845e; color: #d4845e; }

    .cc-section { padding: 48px 0; }
    .cc-section + .cc-section { border-top: 1px solid #2a2a40; }
    .cc-section-title {
      color: #ededf0;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .cc-section-sub {
      color: #6a6a80;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .cc-msg {
      background: #222240;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
      border: 1px solid #2a2a45;
    }
    .cc-msg-user {
      background: #1e1e38;
      border-left: 3px solid #d4845e;
    }
    .cc-msg-assistant {
      background: #222240;
      border-left: 3px solid #6366f1;
    }
    .cc-msg-tool {
      background: #1c2a1c;
      border-left: 3px solid #4ade80;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .cc-msg-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .cc-msg-label-user { color: #d4845e; }
    .cc-msg-label-assistant { color: #6366f1; }
    .cc-msg-label-tool { color: #4ade80; }

    .cc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 640px) { .cc-grid { grid-template-columns: 1fr; } }

    .cc-card {
      background: #222240;
      border: 1px solid #2a2a45;
      border-radius: 10px;
      padding: 16px 18px;
      transition: border-color 0.15s;
    }
    .cc-card:hover { border-color: #d4845e; }
    .cc-card-title {
      color: #ededf0;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .cc-card-desc {
      color: #8888a0;
      font-size: 13px;
      line-height: 1.5;
    }

    .cc-process {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .cc-phase {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid #2a2a40;
    }
    .cc-phase:last-child { border-bottom: none; }
    .cc-phase-num {
      color: #d4845e;
      font-weight: 700;
      font-size: 13px;
      min-width: 24px;
      font-family: 'JetBrains Mono', monospace;
    }
    .cc-phase-name {
      color: #ededf0;
      font-weight: 600;
      font-size: 14px;
      min-width: 80px;
      font-family: 'JetBrains Mono', monospace;
    }
    .cc-phase-desc { color: #8888a0; font-size: 13px; }
    .cc-phase-arrow {
      color: #3a3a50;
      font-size: 12px;
      padding: 4px 0;
      text-align: center;
      font-family: monospace;
    }

    .cc-badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .cc-badge-cli {
      background: #2a2a45;
      color: #d4845e;
      border: 1px solid #3a3a50;
    }
    .cc-badge-cli:hover { border-color: #d4845e; background: #2e2845; }
    .cc-badge-ide {
      background: #2a2a45;
      color: #6366f1;
      border: 1px solid #3a3a50;
    }
    .cc-badge-ide:hover { border-color: #6366f1; background: #282845; }

    .cc-platforms-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .cc-thinking {
      color: #6a6a80;
      font-style: italic;
      font-size: 13px;
      padding: 8px 0;
    }

    .cc-prompt {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: #222240;
      border-radius: 10px;
      border: 1px solid #2a2a45;
      margin-top: 20px;
    }
    .cc-prompt-caret {
      color: #d4845e;
      font-size: 16px;
      font-weight: 700;
    }
    .cc-prompt-text {
      color: #6a6a80;
      font-size: 14px;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    .cc-cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: #d4845e;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    .cc-footer {
      border-top: 1px solid #2a2a40;
      padding: 32px 0;
      text-align: center;
      color: #5a5a70;
      font-size: 13px;
    }
    .cc-footer a { color: #d4845e; }
    .cc-footer a:hover { text-decoration: underline; }

    .cc-install {
      background: #16162a;
      border: 1px solid #2a2a45;
      border-radius: 10px;
      padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #c8c8d4;
      margin-top: 28px;
      position: relative;
    }
    .cc-install-label {
      color: #6a6a80;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .cc-install-line { margin: 2px 0; }
    .cc-install-line::before { content: '$ '; color: #d4845e; }
    .cc-install-comment { color: #4a4a60; }
  </style>
</head>
<body>
<script type="module" src="./bundle.js"></script>
</body>
</html>
