<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gm: State machine for coding agents</title>
  <meta name="description" content="gm enforces a strict work cycle on every coding task: plan unknowns, execute against real services, emit after validation, verify, complete clean. Runs on Claude Code, Gemini CLI, OpenCode, Kilo, Codex, Copilot, VS Code, Cursor, Zed, and JetBrains.">
  <meta name="keywords" content="agentic coding, coding agent, Claude Code plugin, Gemini CLI plugin, immutable programming, state machine, gm agent, gm skill, lang plugin, webjsx">
  <meta name="author" content="AnEntrypoint">
  <link rel="canonical" href="https://anentrypoint.github.io/plugforge/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://anentrypoint.github.io/plugforge/">
  <meta property="og:title" content="gm: State machine for coding agents">
  <meta property="og:description" content="A state machine that keeps coding sessions on track. Plan unknowns, execute against real services, verify output, complete clean. 11 platforms.">
  <meta property="og:image" content="https://anentrypoint.github.io/plugforge/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://anentrypoint.github.io/plugforge/">
  <meta name="twitter:title" content="gm: State machine for coding agents">
  <meta name="twitter:description" content="A state machine that keeps coding sessions on track. Plan unknowns, execute against real services, verify output, complete clean. 11 platforms.">
  <meta name="twitter:image" content="https://anentrypoint.github.io/plugforge/og-image.png">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="stylesheet" href="./styles.css">
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16162a;
      --bg-tertiary: #222240;
      --border-light: #2a2a40;
      --border-mid: #3a3a50;
      --text-primary: #ededf0;
      --text-secondary: #c8c8d4;
      --text-muted: #8888a0;
      --text-disabled: #6a6a80;
      --accent-primary: #d4845e;
      --accent-hover: #e8927c;
      --accent-secondary: #6366f1;
      --color-success: #4ade80;
      --color-warning: #fbbf24;
      --color-error: #ef4444;
      --color-info: #3b82f6;
      --border-radius: 8px;
      --border-radius-sm: 6px;
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-normal: 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        linear-gradient(0deg, transparent 24%, rgba(212, 132, 94, 0.02) 25%, rgba(212, 132, 94, 0.02) 26%, transparent 27%, transparent 74%, rgba(212, 132, 94, 0.02) 75%, rgba(212, 132, 94, 0.02) 76%, transparent 77%, transparent),
        linear-gradient(90deg, transparent 24%, rgba(212, 132, 94, 0.02) 25%, rgba(212, 132, 94, 0.02) 26%, transparent 27%, transparent 74%, rgba(212, 132, 94, 0.02) 75%, rgba(212, 132, 94, 0.02) 76%, transparent 77%, transparent);
      background-size: 40px 40px;
      background-position: 0 0;
      pointer-events: none;
      z-index: -1;
    }

    @media (prefers-reduced-motion: reduce) {
      body::before { background-image: none; }
    }

    code, pre, .mono {
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace;
      font-size: 13px;
    }

    ::selection { background: var(--accent-primary); color: var(--bg-primary); }
    a { color: inherit; text-decoration: none; }

    h1, h2, h3, h4, h5, h6 {
      font-weight: 600;
      line-height: 1.2;
    }

    .cc-nav {
      border-bottom: 1px solid var(--border-light);
      padding: 10px 0;
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    .cc-nav-inner {
      max-width: 840px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cc-logo {
      color: var(--accent-primary);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
      font-family: 'JetBrains Mono', monospace;
    }
    .cc-nav-links { display: flex; gap: 20px; }
    .cc-nav-link { color: var(--text-muted); font-size: 14px; transition: color var(--transition-fast); }
    .cc-nav-link:hover { color: var(--accent-primary); }

    .cc-wrap {
      max-width: 840px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .cc-hero {
      padding: 64px 0 48px;
      border-bottom: 1px solid var(--border-light);
    }
    .cc-hero h1 {
      font-size: 42px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -1px;
      margin-bottom: 12px;
      line-height: 1.15;
    }
    .cc-hero h1 span { color: var(--accent-primary); }
    .cc-hero-sub {
      color: var(--text-muted);
      font-size: 17px;
      max-width: 560px;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .cc-hero-actions { display: flex; gap: 12px; }
    .cc-btn-primary {
      background: var(--accent-primary);
      color: var(--bg-primary);
      padding: 10px 20px;
      border-radius: var(--border-radius-sm);
      border: 2px solid var(--accent-primary);
      font-weight: 600;
      font-size: 14px;
      transition: all var(--transition-fast);
      cursor: pointer;
    }
    .cc-btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .cc-btn-primary:focus-visible { outline: 2px solid var(--accent-secondary); outline-offset: 2px; }
    .cc-btn-ghost {
      border: 1px solid var(--border-mid);
      color: var(--text-secondary);
      padding: 10px 20px;
      border-radius: var(--border-radius-sm);
      font-weight: 500;
      font-size: 14px;
      transition: all var(--transition-fast);
      background: transparent;
      cursor: pointer;
    }
    .cc-btn-ghost:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
    .cc-btn-ghost:focus-visible { outline: 2px solid var(--accent-secondary); outline-offset: 2px; }

    .cc-section { padding: 48px 0; }
    .cc-section + .cc-section {
      border-top: 1px dashed var(--border-light);
      padding-top: 48px;
    }
    .cc-section-title {
      color: var(--text-primary);
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -0.5px;
    }
    .cc-section-sub {
      color: var(--text-disabled);
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .cc-msg {
      background: var(--bg-tertiary);
      border-radius: var(--border-radius);
      padding: 16px 20px;
      margin-bottom: 12px;
      border: 1px solid var(--border-light);
      transition: border-color var(--transition-fast);
    }
    .cc-msg-user {
      background: var(--bg-secondary);
      border-left: 3px solid var(--accent-primary);
    }
    .cc-msg-assistant {
      background: var(--bg-tertiary);
      border-left: 3px solid var(--accent-secondary);
    }
    .cc-msg-tool {
      background: rgba(74, 222, 128, 0.05);
      border-left: 3px solid var(--color-success);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .cc-msg-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 6px;
      font-family: 'JetBrains Mono', monospace;
    }
    .cc-msg-label-user { color: var(--accent-primary); }
    .cc-msg-label-assistant { color: var(--accent-secondary); }
    .cc-msg-label-tool { color: var(--color-success); }

    .cc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) { .cc-grid { grid-template-columns: 1fr; } }

    .cc-card {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-light);
      border-radius: var(--border-radius);
      padding: 20px;
      transition: all var(--transition-fast);
    }
    .cc-card:hover { border-color: var(--accent-primary); }
    .cc-card-title {
      color: var(--text-primary);
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 8px;
      font-family: 'JetBrains Mono', monospace;
    }
    .cc-card-desc {
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .cc-process {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .cc-phase {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px dashed var(--border-light);
    }
    .cc-phase:last-child { border-bottom: none; }
    .cc-phase-num {
      color: var(--accent-primary);
      font-weight: 700;
      font-size: 13px;
      min-width: 24px;
      font-family: 'JetBrains Mono', monospace;
    }
    .cc-phase-name {
      color: var(--text-primary);
      font-weight: 700;
      font-size: 14px;
      min-width: 80px;
      font-family: 'JetBrains Mono', monospace;
    }
    .cc-phase-desc { color: var(--text-muted); font-size: 13px; line-height: 1.5; }
    .cc-phase-arrow {
      color: var(--border-mid);
      font-size: 12px;
      padding: 4px 0;
      text-align: center;
      font-family: monospace;
    }

    .cc-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: var(--border-radius-sm);
      font-size: 12px;
      font-weight: 600;
      transition: all var(--transition-fast);
      border: 1px solid;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
    }
    .cc-badge-cli {
      background: var(--bg-tertiary);
      color: var(--accent-primary);
      border-color: var(--accent-primary);
    }
    .cc-badge-cli:hover { background: var(--bg-secondary); opacity: 0.9; }
    .cc-badge-cli::before { content: '❯ '; margin-right: 2px; }
    .cc-badge-ide {
      background: var(--bg-tertiary);
      color: var(--accent-secondary);
      border-color: var(--accent-secondary);
    }
    .cc-badge-ide:hover { background: var(--bg-secondary); opacity: 0.9; }
    .cc-badge-ide::before { content: '◇ '; margin-right: 2px; }

    .cc-platforms-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .cc-input, .cc-textarea, .cc-select {
      display: block;
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: var(--border-radius-sm);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 14px;
      transition: border-color var(--transition-fast);
    }
    .cc-input:focus, .cc-textarea:focus, .cc-select:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 2px rgba(212, 132, 94, 0.1);
    }
    .cc-input::placeholder, .cc-textarea::placeholder {
      color: var(--text-disabled);
    }

    .cc-form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .cc-form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }
    .cc-form-label-required::after {
      content: ' *';
      color: var(--color-error);
      font-weight: 700;
    }
    .cc-form-help {
      font-size: 12px;
      color: var(--text-disabled);
      margin-top: 4px;
    }

    .cc-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }
    .cc-status-success { color: var(--color-success); }
    .cc-status-warning { color: var(--color-warning); }
    .cc-status-error { color: var(--color-error); }
    .cc-status-info { color: var(--color-info); }
    .cc-status-dot { font-size: 16px; }

    .cc-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-light);
      border-radius: var(--border-radius);
      font-size: 13px;
      max-width: 400px;
      animation: slideIn 300ms ease-out;
      z-index: 1000;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      @keyframes slideIn { from { opacity: 0; } to { opacity: 1; } }
    }

    .cc-progress {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .cc-progress-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
    }
    .cc-progress-bar {
      width: 100%;
      height: 6px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 3px;
      overflow: hidden;
    }
    .cc-progress-fill {
      height: 100%;
      background: var(--accent-primary);
      transition: width var(--transition-normal);
    }

    .cc-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border-light);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 600ms linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      @keyframes spin { from { opacity: 0.5; } to { opacity: 1; } }
      .cc-spinner { animation: spin 2s linear infinite; }
    }

    .cc-modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(26, 26, 46, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(4px);
    }
    .cc-modal {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-light);
      border-radius: var(--border-radius);
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .cc-modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
      font-family: 'JetBrains Mono', monospace;
    }
    .cc-modal-body {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .cc-modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .cc-table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
    }
    .cc-table th {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      padding: 12px;
      font-size: 12px;
      font-weight: 700;
      text-align: left;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-secondary);
    }
    .cc-table td {
      border: 1px solid var(--border-light);
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .cc-table tbody tr:nth-child(even) {
      background: rgba(212, 132, 94, 0.03);
    }
    .cc-table tbody tr:hover {
      background: rgba(212, 132, 94, 0.06);
    }

    .cc-thinking {
      color: var(--text-disabled);
      font-style: italic;
      font-size: 13px;
      padding: 8px 0;
      font-family: 'JetBrains Mono', monospace;
    }

    .cc-prompt {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border-radius: var(--border-radius);
      border: 1px solid var(--border-light);
      margin-top: 20px;
    }
    .cc-prompt-caret {
      color: var(--accent-primary);
      font-size: 16px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }
    .cc-prompt-text {
      color: var(--text-disabled);
      font-size: 14px;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      @keyframes blink { 0%, 100%, 50% { opacity: 1; } }
    }
    .cc-cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: var(--accent-primary);
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    .cc-footer {
      border-top: 1px dashed var(--border-light);
      padding: 32px 0;
      text-align: center;
      color: var(--text-disabled);
      font-size: 13px;
      margin-top: 48px;
    }
    .cc-footer a { color: var(--accent-primary); transition: opacity var(--transition-fast); }
    .cc-footer a:hover { opacity: 0.8; }

    .cc-install {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: var(--border-radius);
      padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 28px;
      position: relative;
    }
    .cc-install-label {
      color: var(--text-disabled);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .cc-install-line { margin: 4px 0; }
    .cc-install-line::before { content: '$ '; color: var(--accent-primary); font-weight: 700; }
    .cc-install-comment { color: var(--text-disabled); }
  </style>
</head>
<body>
<script type="module" src="./bundle.js"></script>
</body>
</html>
