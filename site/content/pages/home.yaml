id: home
title: gm
hero:
  heading: "glootius maximus"
  subheading: "more coushin' for the puhin'"
  body: "gm convinces your coding agent that it already is a deterministic state machine. PLAN → EXECUTE → EMIT → VERIFY → COMPLETE. it cushions the seat your agent has to sit on to actually finish the job. named after glootius maximus — the muscle that holds you in the chair while you finish the work."
  badges:
    - { label: "PLAN→EXECUTE→EMIT→VERIFY" }
    - { label: "15 platforms, one source" }
    - { label: "WASM polymorphism for IDEs" }
    - { label: "rust-backed, no daemons in your face" }
    - { label: "covering family of bounded subsets" }
    - { label: "every dispatch through one spool folder" }
    - { label: "no mocks, no skips, no excuses" }
  ctas:
    - { label: "⭐ Star on GitHub", href: "https://github.com/AnEntrypoint/gm", primary: true }
    - { label: "Install", href: "https://github.com/AnEntrypoint/gm#install" }
    - { label: "live stats", href: "./stats/" }
    - { label: "rust crates", href: "./crates/" }
    - { label: "skills", href: "./skills/" }
features:
  heading: "what you get when you sit down"
  items:
    - name: "the agent thinks it's a state machine"
      desc: "PLAN → EXECUTE → EMIT → VERIFY → COMPLETE. there is no skip button. there is no 'just this once'. the agent learns the rhythm by being the rhythm. a written PRD is the user's authorization — the agent stops asking and starts doing."
    - name: "witnessed execution or it didn't happen"
      desc: "every unknown is resolved by running code, not by guessing. exec:<lang> for proofs, exec:codesearch for whereabouts, exec:recall for what we already learned. the words 'I think this should work' are physically blocked at the hook layer."
    - name: "covering family of bounded subsets"
      desc: "when a request exceeds reach, the agent does not pick one piece and call the rest 'follow-up'. it enumerates every witnessable subset of the ask, executes each, and names the residual complement explicitly. partial delivery dressed up as triage is refusal in disguise — and we don't refuse."
    - name: "15 platforms, one source"
      desc: "claude code, gemini cli, opencode, kilo, codex, copilot cli, qwen, hermes, vscode, cursor, zed, jetbrains, copilot-cli, antigravity, windsurf. one gm-starter directory; CI fans the build out to fifteen downstream repos as single-commit orphan histories. add a hook once, it shows up everywhere — like a really persistent subscription you actually want."
    - name: "WASM polymorphism for IDE plugins"
      desc: "seven platforms (vs code, cursor, zed, jetbrains, antigravity, windsurf, thebird) ship a single plugkit.wasm binary that runs natively on all operating systems. no platform-specific builds, no multi-megabyte bundles per architecture. the wasm host delegates to node.js for filesystem, subprocess, and fetch — same performance profile as the native binary, simpler distribution."
    - name: "rust-backed runtime"
      desc: "rs-exec is the runner. rs-codeinsight is the AST x-ray. rs-search is the fast file finder. rs-learn is the memory store. rs-plugkit is the binary that ties it together. every push to any of them auto-cascades to the binary in your plugin within minutes — no manual cargo build, no version jujitsu."
    - name: "ccsniff says you're 100% compliant"
      desc: "a built-in compliance auditor reads your conversation log and grades whether you behaved like the state machine claims you did. distributed refusal is now a flagged failure. the lint runs in seconds and tells you exactly which turn you cheated on."
    - name: "one spool folder, every dispatch"
      desc: "code AND every utility verb write a file to .gm/exec-spool/in/<lang-or-verb>/<N>.<ext>. the watcher streams stdout, stderr, and a metadata sidecar back. tool args are ephemeral; a file on disk is auditable, replayable, and survives compaction. the Bash tool accepts only git — everything else routes through the folder or gets denied at the hook."
    - name: "the mutables file refuses to forget"
      desc: ".gm/mutables.yml lives alongside the PRD. every unknown is a row; status flips to 'witnessed' only when the row carries concrete proof. writes, commits, pushes, and the stop hook are all hard-blocked while any row says 'unknown' — the discipline lives on disk, not in the agent's context window."
    - name: "disciplines keep memory honest"
      desc: "a @discipline sigil scopes recall, codesearch, and memorize to one knowledge store. read broadly, write narrowly: without a sigil, reads fan across enabled disciplines but writes go to default only. cross-project memory bleed produces hallucinated weak_priors — disciplines stop that at the boundary."
quickstart:
  heading: sit down
  lines:
    - { kind: "cmt", text: "# claude code" }
    - { kind: "cmd", text: "claude plugin marketplace add AnEntrypoint/gm && claude plugin install -s user gm@gm" }
    - { kind: "cmt", text: "" }
    - { kind: "cmt", text: "# everywhere else" }
    - { kind: "cmd", text: "npx gm" }
    - { kind: "cmt", text: "" }
    - { kind: "cmt", text: "# update (it auto-bumps daily, but force it)" }
    - { kind: "cmd", text: "claude plugin marketplace update gm && claude plugin update gm@gm" }
examples:
  heading: read further
  items:
    - { name: "the complete discipline", desc: "lifecycle control, governance, and operational hard rules — one paper, every rule the agent runs under", cta: "open paper", href: "./paper/" }
    - { name: "every rust crate", desc: "rs-exec, rs-codeinsight, rs-search, rs-learn, rs-plugkit — what each does, why it exists, what it kills if it misbehaves", cta: "open crates", href: "./crates/" }
    - { name: "every skill", desc: "fourteen skills in the chain — gm, planning, gm-execute, gm-emit, gm-complete, update-docs, governance, code-search, browser, ssh, pages, create-lang-plugin, research, textprocessing, plus the memorize and research-worker sub-agents", cta: "open skills", href: "./skills/" }
    - { name: "distribution", desc: "the cascade pipeline that puts a fresh binary in your plugin every time anyone touches a rust crate", cta: "open distribution", href: "./distribution/" }
