version: 1
title: Complete Orchestration Consolidation - Hook→FileSpooling + WASM Binary Migration
scope: maximum-effort
destructive_permissions: true

items:
  - id: 1
    title: Validate gm-skill as golden source
    description: |
      Audit current gm-skill setup (daemon bootstrap, file-spool dispatch, skill chain)
      to ensure it's the reference implementation. Fix any gaps in daemon lifecycle,
      socket management, marker-file dispatch, and bootstrap error handling.
    status: pending
    depends_on: []

  - id: 2
    title: Validate acptoapi + ACP agents (kilo, opencode)
    description: |
      Ensure c:\dev\acptoapi starts flawlessly, spawns kilo and opencode as free
      fallback providers. Validate rs-learn can use acptoapi for all operations
      (memory recall, ingestion, search). Verify bun/node can invoke acptoapi
      without npx or bun x wrappers.
    status: pending
    depends_on: [1]

  - id: 3
    title: Consolidate file-spool reporting and responsiveness
    description: |
      Make file-spool dispatch reporting as slick as possible. Ensure daemon
      stdout/stderr is captured and reported in real-time. Audit spool markers
      (.gm/prd.yml, .gm/mutables.yml, .gm/needs-gm, .gm/gm-fired-*) for
      completeness. Implement trigger-response latency optimization.
    status: pending
    depends_on: [1]

  - id: 4
    title: Remove exec:bash hook override, replace with file-spool
    description: |
      Remove all references to old exec:bash hook-based setup from rs-exec,
      rs-plugkit, and gm. Replace with pure file-spool dispatch. Audit
      c:\dev\rs-exec, c:\dev\rs-plugkit, c:\dev\gm for hook remnants.
      Ensure file-spool is the only execution path.
    status: pending
    depends_on: [3]

  - id: 5
    title: Consolidate platform adapters to file-spool only
    description: |
      Update all 15 platform adapters (cc, gc, oc, codex, kilo, qwen, hermes,
      thebird, vscode, cursor, zed, jetbrains, copilot-cli, antigravity, windsurf)
      to remove hook generation entirely. Use file-spool bootstrap instead.
      Reduce code duplication across adapters.
    status: pending
    depends_on: [4]

  - id: 6
    title: Generic adapter architecture refactor
    description: |
      Refactor adapter classes to reduce duplication and increase maintainability.
      Create shared base methods for file-spool dispatch, lib file loading,
      bootstrap configuration. Target: single source of truth for common patterns.
    status: pending
    depends_on: [5]

  - id: 7
    title: Build and test WASM binaries locally
    description: |
      Ensure Rust build environment is working. Build rs-exec, rs-codeinsight,
      rs-search, rs-plugkit, rs-learn to WASM targets. Validate each builds
      without errors.
    status: pending
    depends_on: [2]

  - id: 8
    title: Validate WASM binary equivalence
    description: |
      Test WASM binaries against current OS binaries. Verify functional parity:
      exec commands, codeinsight indexing, search, rs-learn daemon, plugkit
      dispatch, bootstrap. Ensure polymorphic execution (CLI, browser, OS tool)
      works identically.
    status: pending
    depends_on: [7]

  - id: 9
    title: Migrate gm to use WASM binaries
    description: |
      Update gm-starter bootstrap.js to download and run WASM binaries instead
      of OS binaries. Update gm.json to reference WASM versions. Update all
      15 downstream platforms to use WASM bootstrap.
    status: pending
    depends_on: [8]

  - id: 10
    title: Remove OS binary CI pipelines
    description: |
      Delete GitHub Actions workflows that build OS binaries for Windows, Linux,
      macOS (both ARM64 and x86_64) from rs-exec, rs-codeinsight, rs-search,
      rs-plugkit, rs-learn. Replace with single WASM build pipeline.
    status: pending
    depends_on: [9]

  - id: 11
    title: Audit and fix gh-pages website
    description: |
      Audit https://anentrypoint.github.io/gm/ for drift from code. Fix:
      - Navigation links that changed
      - Feature descriptions that no longer match
      - Architecture diagrams that reference hooks
      - Binary download instructions (now WASM)
      - Setup/installation docs (now file-spool based)
      - Any outdated screenshots or examples
    status: pending
    depends_on: [9]

  - id: 12
    title: Test full end-to-end flow
    description: |
      Comprehensive testing of complete pipeline: gm-skill daemon spawn,
      file-spool dispatch, ACP agent fallback, WASM binary execution,
      memory persistence, code search, learning, skill chain progression.
      All 15 platforms. All major code paths.
    status: pending
    depends_on: [11]

  - id: 13
    title: Push consolidated codebase
    description: |
      Final commit and push to all repos (gm, rs-exec, rs-plugkit, rs-codeinsight,
      rs-search, rs-learn, and all 15 downstream platforms). Verify CI passes.
    status: pending
    depends_on: [12]

gates:
  - marker: .gm/needs-gm
    description: Orchestration gate—agent must run gm skill to clear
  - marker: .gm/mutables.yml
    description: Unresolved mutables block execution until all reach witnessed status
  - marker: .gm/gm-fired-<sessionId>
    description: File-spool dispatch gate—cleared after each turn

notes: |
  - Destructive permissions granted: OK to delete hooks, rewrite CI, refactor
  - Golden source: gm-skill (daemon + bootstrap + file-spool)
  - Reference ACP: acptoapi with kilo/opencode as free fallbacks
  - Binary target: WASM only; phase out OS builds entirely
  - Scope: Reduce hook footprint to zero, consolidate file-spool, unify
    polymorphic execution (CLI, browser, OS tool), simplify codebase
  - Timeline: Single maximum-effort run; no re-asking
  - Success: All 15 platforms working, WASM binaries deployed, website synced,
    full test pass

audit_findings:
  gap_1: Daemon functions missing from gm-skill source (exist only in build/)
  gap_2: Port reachability uses spool delegation instead of direct TCP socket
  gap_3: Marker files .gm/needs-gm and .gm/gm-fired-<sessionId> not being written
  gap_4: Socket connectivity checks lack verification after startup
  gap_5: Hook-based tool tracking should be replaced with .gm/turn-state.json
  gap_6: Session lifecycle not tracked before skill entry
  gap_7: gm-execute infinite loop risk - no max-pass counter on mutables resolution
