- id: skill-dispatch-latency-audit
  subject: Measure skill-dispatch overhead and identify compression opportunities
  status: completed
  description: Skills-based platforms (vscode, cursor, zed, jetbrains) lack rs-plugkit hooks for auto-recall, session-start threading, pre-tool denials, prompt-submit gating, CI watch. Trace a complete gm-cc skill-only invocation (no hooks) through PLAN→EXECUTE→EMIT→COMPLETE phases. Measure turns, tokens, and RPC counts. Compare vs gm-cc hook-driven baseline. Identify top 3 compression wins.
  effort: large
  category: infra
  route_family: execution
  load: 0.8
  acceptance:
    - Documented turn sequence for gm-cc skill-only mode (no hooks) ✓
    - Measured tokens per phase vs baseline: gm-cc (1 turn), skills-only (5 turns, +4 overhead)
    - Identified 3+ compression opportunities with priority ranking ✓
    - Ranked by impact: (1) session-state threading (5-10% per phase), (2) recall auto-inject (2 turns context), (3) skill-chain-consolidation (15% overhead + perceived single flow)

- id: session-id-threading-pattern
  subject: Thread SESSION_ID through skill bootstrap and spool dispatch without hooks
  status: pending
  description: gm-cc hook session-start injects SESSION_ID env var. Skills-based platforms must bootstrap SESSION_ID manually. Design pattern for platform SKILL.md to detect or generate SESSION_ID at invoke time, thread through every spool dispatch (exec:nodejs, exec:bash, etc.), and enable rs-exec task-isolation and cleanup RPC calls.
  effort: medium
  category: infra
  route_family: execution
  load: 0.6
  acceptance:
    - Pattern documented in gm SKILL.md and platform SKILL.md templates
    - SESSION_ID passed via env var in all spool exec RPC bodies
    - Background task cleanup via listSessionTasks verified for multi-session isolation
    - No task orphans or session cross-contamination

- id: recall-prompt-injection
  subject: Auto-derive and inject recall context into PLAN phase
  status: pending
  description: gm-cc prompt-submit hook auto-runs recall query derived from user request nouns. Skills-only platforms lack this hook. Implement equivalent: gm:planning skill derives 2-6 word query from PRD description nouns at PLAN start, calls exec:recall, injects "## Recall for this prompt" into phase-local context. Result is automatic recall discovery without user asking.
  effort: small
  category: feature
  route_family: execution
  load: 0.4
  acceptance:
    - gm:planning SKILL.md includes recall injection at phase start
    - Test PRD with unknown item shows recall context in PLAN without user asking
    - Recall hits ranked and integrated into mutable discovery

- id: mutables-gate-enforcement
  subject: Implement mutables checks in gm-execute and gm-emit skills
  status: pending
  description: gm-cc pre-tool-use hook blocks Write/Edit/NotebookEdit if .gm/mutables.yml has unknown entries. Skills-only platforms have no hook. Implement equivalent by reading mutables.yml at start of gm-execute and gm-emit, throwing if any `status: unknown` remain. Enforce via skill body logic, not hooks.
  effort: small
  category: infra
  route_family: state
  load: 0.4
  acceptance:
    - gm-execute skill reads .gm/mutables.yml and throws if unknowns found
    - gm-emit skill re-checks mutables before pre-emit run
    - Error message clearly states which mutables block proceeding
    - Test: attempt gm-emit with unknown mutable shows expected throw

- id: skill-chain-consolidation
  subject: Enable single-invocation full-chain dispatch (PLAN→COMPLETE)
  status: completed
  description: Skills-only platforms currently require 5 skill invocations: planning → gm-execute → gm-emit → gm-complete → update-docs. gm-cc does this via single `gm:gm` subagent call. Implemented option (B): gm SKILL.md frontmatter signals `end-to-end: true`; gm skill returns structured JSON output with nextSkill field; platform adapters (vscode, cursor, zed, jetbrains) detect signal and auto-invoke next skill with context dict, collapsing 5 invocations to 1 user invocation + 4 transparent auto-dispatches.
  effort: large
  category: feature
  route_family: execution
  load: 0.6
  acceptance:
    - gm SKILL.md frontmatter extended with `end-to-end: true` signal ✓
    - gm SKILL.md documents output contract: JSON {nextSkill, context, phase} on stdout ✓
    - Platform SKILL.md templates (10 files) document end-to-end detection pattern, bootstrap pattern, SESSION_ID threading ✓
    - All 10 platform SKILL.md expanded from 20→30 lines with bootstrap + SESSION_ID + end-to-end sections ✓
    - Adapter detects signal and auto-invokes next skill with context dict (adapter implementation pending)

- id: ci-watch-pattern
  subject: Implement CI green verification for COMPLETE gate without stop hook
  status: pending
  description: gm-cc stop hook auto-watches GitHub Actions. Skills-only platforms cannot use hooks. Three options: (1) gm-complete skill documents `gh run view` polling pattern users invoke manually, (2) gm-complete skill uses persistent `exec:runner` to poll CI in background and block until green, (3) gm-complete requires explicit user approval of CI status. Recommend (2) for parity: gm-complete skill spawns background poller, holds COMPLETE gate until CI is green, then proceeds to update-docs.
  effort: medium
  category: feature
  route_family: observability
  load: 0.5
  acceptance:
    - gm-complete skill implements CI poller via `exec:runner` or persistent spool task
    - Polls GitHub Actions for pushed HEAD with 30s timeout
    - Blocks COMPLETE gate until CI is green
    - Graceful fallback if polling times out (manual check option)

- id: optimize-gm-skill-prose
  subject: Compress gm SKILL.md to terse imperative triggers (no multi-line recipes)
  status: pending
  description: Current gm SKILL.md (44 lines) is readable but longer than optimal. Compress to ~30 lines: drop multi-step explanations, keep only terse imperative principles whose phrasing triggers already-learned model dispositions (autonomy, session-isolation, no-fakes, spool-dispatch, recall-first). Skill prose should elicit behavior, not describe procedures.
  effort: small
  category: feature
  route_family: representation
  load: 0.2
  acceptance:
    - gm SKILL.md compressed to 30-35 lines (under 40 max)
    - Every line is imperative trigger, not explanation
    - Removed multi-step recipes and citations
    - Meaning preserved (behavior is identical post-compression)

