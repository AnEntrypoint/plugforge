  witness_method: exec:codesearch acptoapi session_start spawn daemon
  witness_evidence: rs-plugkit/src/hook/session_start.rs:201 spawn_acptoapi_if_needed() - checks port 4800, spawns bun x acptoapi@latest on line 220
