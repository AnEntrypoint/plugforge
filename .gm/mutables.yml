- id: spool-refactor-scope
  claim: Spool dispatch patterns can be refactored to skill-initiated (skill writes state, reads spool results) without hook gates
  witness_method: "codesearch + gm-execute SKILL.md + exec:nodejs analysis"
  witness_evidence: "gm-starter/skills/gm-execute/SKILL.md:43 documents spool dispatch contract: 'The spool watcher executes and streams stdout to out/<N>.out, stderr to out/<N>.err, then writes out/<N>.json metadata sidecar at completion (taskId, lang, ok, exitCode, durationMs, timedOut, startedAt, endedAt).' AGENTS.md:133 describes hook coordination: pre_tool_use reads .gm/needs-gm marker, prompt_submit manages needs-gm based on PRD. REFACTOR PATTERN: (1) Skill writes in/<lang>/<N>.<ext> to spool — no hook gate involved in dispatch; (2) Watcher auto-executes as hook-independent background process; (3) Skill polls out/ for .json completion metadata — no hook read needed; (4) Skill reads result, updates .gm/prd.yml and .gm/mutables.yml state. Gates (needs_gm, mutables check via hook pre_tool_use:178-191) remain orthogonal policy layer, not dispatch control. Pattern is viable: spool is already skill-facing async I/O. No architectural change required — just shift from hook-tail-result to skill-poll-result."
  status: witnessed
