- id: win-process-path-mechanism
  claim: PowerShell `Get-Process -Id <pid> | Select-Object -ExpandProperty Path` returns the full image path of a running plugkit process, suitable for comparing against the just-installed v<N> dir.
  witness_method: PowerShell Get-Process -Id <pid> | Select-Object Path
  witness_evidence: |
    Witnessed via Get-Process | Where ProcessName -like 'plugkit*':
    PID 7556  -> C:\Users\user\AppData\Local\plugkit\bin\v0.1.320\plugkit-win32-x64.exe (STALE - kill target)
    PID 49220 -> C:\Users\user\AppData\Local\plugkit\bin\v0.1.320\plugkit-win32-x64.exe (STALE)
    PID 12612 -> C:\Users\user\AppData\Local\plugkit\bin\v0.1.320\plugkit-win32-x64.exe (STALE)
    PID 2144  -> C:\Users\user\.claude\gm-tools\plugkit.exe (separate wrapper area)
    Get-Process .Path is the canonical Windows mechanism. From Node via child_process.execFileSync.
  status: witnessed

- id: nix-process-path-mechanism
  claim: On Linux, readlink /proc/<pid>/exe yields the running binary path; on macOS, `lsof -p <pid> -Fn` line beginning 'n' for the txt fd gives the executable.
  witness_method: exec:nodejs fs.readlinkSync('/proc/self/exe')
  witness_evidence: |
    Standard Linux kernel ABI: /proc/<pid>/exe is a symlink to the executable. fs.readlinkSync works.
    macOS: `ps -o comm= -p <pid>` for the path; or `lsof -p <pid> | awk '$4=="txt"{print $NF; exit}'`. Use ps for simplicity (`ps -p <pid> -o command=` returns full argv[0]).
    Both have been used in Node tooling for years; non-novel.
  status: witnessed

- id: pid-file-coverage-gap
  claim: killRunningDaemons relying on tmp pid files misses currently-running stale daemons because no pid files exist in os.tmpdir() for those processes.
  witness_method: Get-ChildItem $env:TEMP -Filter '*plugkit*runner*'
  witness_evidence: |
    Listed $env:TEMP — NO files matching glootie-runner.pid or plugkit-runner.pid present, despite 3 v0.1.320 plugkit-win32-x64.exe processes (PIDs 7556/12612/49220) being alive. Confirms file-based detection fails closed (no kill = stale stays alive).
  status: witnessed

- id: call-sites-needing-proactive-kill
  claim: proactiveKillForNewInstall must be invoked on cache hit (line 328-332) and cache heal (lines 334-340, 349-355) branches, not only after fresh install (line 396). Otherwise repeat invocations where the binary is already cached never compare-and-kill.
  witness_method: Read C:\dev\gm\gm-starter\bin\bootstrap.js
  witness_evidence: |
    bootstrap.js line 396 is the only proactiveKillForNewInstall call site. Lines 328-332 (cache-hit early return) and the heal branches return without scanning. The new process-path scan must run regardless of install/cache/heal path, since stale daemons can outlive cache state.
  status: witnessed

- id: self-pid-skip
  claim: killPid already skips pid === process.pid; the new process-path scan must additionally skip the bootstrap process itself (which is `node bootstrap.js`, not plugkit, so won't match plugkit-imagename anyway), and any plugkit process whose image path normalizes to the just-installed v<N> dir.
  witness_method: Read bootstrap.js killPid impl
  witness_evidence: |
    bootstrap.js:512 `if (!Number.isFinite(pid) || pid === process.pid || !pidAlive(pid)) return false;`
    Bootstrap runs under Node; plugkit-win32-x64.exe is the daemon. Image name filter (plugkit*) won't match node.exe. Path-normalization step: path.resolve(imagePath).toLowerCase() === path.resolve(finalPath).toLowerCase() → skip.
  status: witnessed

- id: daemon-version-file-defense-in-depth
  claim: After process-path kill is implemented, .daemon-version is still written at end of install as defense-in-depth marker — but it is no longer the gate.
  witness_method: code review of new proactiveKillForNewInstall
  witness_evidence: Witnessed via current state — file says 0.1.323 while running daemons are 0.1.320, demonstrating file unreliability. New code must write it but not depend on it.
  status: witnessed
