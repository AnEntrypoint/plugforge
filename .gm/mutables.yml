  witness_evidence: "(a) renameWithRetry line 158 calls killHoldersOfPath mid-retry. (b) healIfShaMatches lines 434–440 detects mismatch + writeBootstrapError + unlinks binary. (c) writeBootstrapError called lines 442, 496, 509 on failure phases. (d) cleanOrphanNewFiles line 171 removes .new files before copy."
