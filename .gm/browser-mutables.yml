- id: browser-session-persistence-contract
  claim: Browser sessions keyed by CLAUDE_SESSION_ID persist in ~/.gm/browser-sessions/ until closeSession or cleanup
  witness_method: Read gm-starter/lib/browser.js session management code
  witness_evidence: "loadSessionState(sessionId) at lines 64-78 reads from SESSION_STATE_DIR=~/.gm/browser-sessions/<sessionId>.json; returns default {sessionId, createdAt, commands:[] } on ENOENT. saveSessionState(sessionId, state) at lines 80-88 writes state JSON to file. createSession stores browserSessionId and status in state. Commands logged to state.commands array, trimmed to last 500 (line 246). closeSession deletes state file (line 309). Sessions persist across skill invocations within same CLAUDE_SESSION_ID."
  status: witnessed
