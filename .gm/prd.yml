- id: gm-skill-end-to-end-chaining
  subject: Implement end-to-end skill chaining (JSON handoff between consecutive skills)
  status: completed
  description: |
    When a skill returns nextSkill in JSON, the gm index.js must automatically invoke the next skill and pass context. No manual chaining. Support up to 5 hops in a single gm:gm invocation (gm → planning → gm-execute → gm-emit → gm-complete → update-docs). On nextSkill=null, complete and return. Handle cycle-back to planning when unknowns detected.
  effort: small
  category: feature
  route_family: reasoning
  load: 0.5
  failure_modes:
    - infinite loops (skill returns itself as nextSkill)
    - context lost between hops
    - memory not persisted (recall/memorize failures)
  route_fit: examined
  authorization: witnessed
  blocking: []
  blockedBy: [gm-skill-gm-skill-index]
  acceptance:
    - gm/index.js runs a skill chain loop until nextSkill=null ✓
    - Context object passed as argument to each skill ✓
    - Loop timeout (5 min default) prevents infinite chains ✓
    - Cycle-back to planning on planning-mutable-detect triggers ✓
    - gm/index.js implements while loop that chains skills until nextSkill=null ✓
    - All 6 core skills (gm, planning, gm-execute, gm-emit, gm-complete, update-docs) implemented ✓
    - test-e2e.js verifies chain execution ✓

