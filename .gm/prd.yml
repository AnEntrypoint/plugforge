- id: assess-automation-candidates
  subject: Evaluate 5 automation candidates for readiness, impact, and dependencies
  status: pending
  description: Assess HIGH/MEDIUM/LOW candidates for implementation complexity, required changes, unresolved dependencies
  effort: medium
  category: infra
  route_family: reasoning
  load: 0.6
  failure_modes: ['unknown implementation approach', 'hidden cross-subsystem dependencies']
  route_fit: examined
  authorization: weak_prior
  blocking: ['plan-ready-candidates']
  blockedBy: ['audit-gm-log-1h', 'validate-ccsniff-1h']
  acceptance:
    - HIGH auto-tidyup-no-memorize-marker examined
    - MEDIUM candidates (auto-turn-state-cleanup, auto-batch-ccsniff-validation, auto-cache-invalidation-signal) examined
    - LOW auto-prune-old-gm-logs examined
    - readiness matrix with effort estimate and blocking deps recorded
  edge_cases: []

- id: plan-ready-candidates
  subject: Plan PRD items for all ready automation candidates
  status: pending
  description: For each READY candidate, write a .prd item with acceptance criteria
  effort: small
  category: infra
  route_family: reasoning
  load: 0.5
  failure_modes: []
  route_fit: dominant
  authorization: weak_prior
  blocking: ['execute-automation-items']
  blockedBy: ['assess-automation-candidates']
  acceptance:
    - every READY candidate expanded to full PRD item
    - every BLOCKED candidate recorded with deps
    - no new items for OUT-OF-SCOPE without scope confirmation
  edge_cases: []

- id: execute-automation-items
  subject: Implement all ready automation candidates
  status: pending
  description: Execute every .prd item from plan-ready-candidates in parallel where independent
  effort: large
  category: feature
  route_family: execution
  load: 0.85
  failure_modes: ['implementation error', 'logic regression', 'observability gap']
  route_fit: examined
  authorization: weak_prior
  blocking: ['commit-automation-work']
  blockedBy: ['plan-ready-candidates']
  acceptance:
    - all ready items implemented
    - no pre-existing failures introduced
    - observability extended (new subsystems emit or register)
    - test.js updated if behavior changed
  edge_cases: []

- id: commit-automation-work
  subject: Commit automation changes and verify CI green
  status: pending
  description: Create commit with all automation work, push to origin/main, verify GitHub Actions CI passes
  effort: small
  category: infra
  route_family: boundary
  load: 0.6
  failure_modes: ['CI failure', 'linting error', 'push rejection']
  route_fit: dominant
  authorization: weak_prior
  blocking: ['reschedule-loop']
  blockedBy: ['execute-automation-items']
  acceptance:
    - git status clean
    - commit created and pushed to origin/main
    - GitHub Actions CI passes
  edge_cases: []

- id: reschedule-loop
  subject: Reschedule 1h audit loop via ScheduleWakeup
  status: pending
  description: After all items complete and CI green, invoke ScheduleWakeup with 3600s delay to reschedule next audit cycle
  effort: small
  category: infra
  route_family: boundary
  load: 0.3
  failure_modes: []
  route_fit: dominant
  authorization: witnessed
  blocking: []
  blockedBy: ['commit-automation-work']
  acceptance:
    - ScheduleWakeup called with delay=3600s
    - loop prompt passed verbatim
    - next run scheduled
  edge_cases: []
