- id: parity-functional-completeness
  subject: Run functional parity test comparing gm-skill vs gm-cc outputs
  status: completed
  description: |
    Execute identical tasks in both gm-skill and gm-cc harnesses and compare outputs. Verify: PRD generation identical, skill chain identical, git state identical, AGENTS.md identical, file creation identical. Document any divergences and fix them.
  effort: large
  category: infra
  route_family: boundary
  load: 0.8
  failure_modes:
    - outputs diverge (PRD different, files different)
    - skill chain fails while hook chain succeeds
    - git state inconsistent
    - search results different between codeinsight paths
  route_fit: examined
  authorization: witnessed
  blocking: [parity-residual-work]
  blockedBy: [parity-hook-elimination]
  acceptance:
    - Identical task request given to both harnesses
    - PRD files compared (yaml diff)
    - Skill chain outputs compared (json equality)
    - Final git state identical (diff, log)
    - Final file set identical (ls -la, hash check)
    - Any divergences fixed in follow-up items

