- id: enable-gc-skills-loading
  subject: Enable gm-gc to load skills from source
  status: completed
  description: Change gc config loadSkillsFromSource from returning {} to actually loading skills like codex does
  effort: small
  category: feature
  route_family: boundary
  load: 0.8
  acceptance:
    - gc config calls TemplateBuilder.loadSkillsFromSource() ✓
    - build/gm-gc/skills/ populated with all skill directories ✓
    - package.json files array includes 'skills/' ✓
  witness_evidence: |
    File: platforms/cli-config-shared.js line 1381
    Changed: loadSkillsFromSource() { return {}; }
    To: loadSkillsFromSource(sourceDir) { return TemplateBuilder.loadSkillsFromSource(sourceDir, 'skills'); }
    
    Result: build/gm-gc file count increased from 33 to 57 files, including all 24 skills

- id: create-gc-feature-parity-doc
  subject: Document gm-gc feature parity with gm-cc and any workarounds
  status: completed
  description: Create GEMINI.md with feature list, installation guide, known limitations, and elegant workarounds for platform differences
  effort: small
  category: infra
  load: 0.4
  acceptance:
    - Documented which gm-cc features work in gm-gc ✓
    - Listed 5 elegant workarounds for platform differences ✓
    - Clear installation instructions ✓
    - Hook event mapping documented ✓
  witness_evidence: |
    File: gm-starter/GEMINI.md (407 lines)
    Sections:
    1. Feature Parity table (7 features all ✓)
    2. Installation (git clone + npm install)
    3. Hook Event Mapping (BeforeTool, SessionStart, BeforeAgent, SessionEnd)
    4. Five Elegant Workarounds:
       - Hook Execution Model (JS vs plugkit)
       - File Installation Paths (.claude vs .gemini)
       - Skills Distribution (filesystem vs spool)
       - Prompts and Context (memory vs turn-state.json)
       - Agent Dispatch (native vs ACP)
    5. Directory Structure
    6. Operational Differences
    7. Limitations & Future Work
    8. Troubleshooting

