- id: inspect-gm-log-snapshot-5m
  subject: Inspect gm-log 5-min snapshot and identify subsystem coverage gaps
  status: pending
  description: Read ~/.claude/gm-log/ current day JSONL files. Count events per subsystem, check for missing coverage (hook, exec, rs_learn, rs_codeinsight, rs_search, bootstrap, plugkit_wrapper). Identify any subsystems with zero or sparse events.
  effort: small
  category: observability
  route_family: observability
  load: 0.6
  failure_modes: ['gm-log dir missing', 'no JSONL files', 'malformed entries']
  route_fit: examined
  authorization: witnessed
  blocking: ['run-ccsniff-5m-window', 'plan-observability-improvements']
  blockedBy: []
  acceptance:
    - 'Read today's gm-log JSONL files, count events per subsystem'
    - 'Report subsystems with zero events or sparse (<5) event count'
    - 'Verify all 8 expected subsystems are accounted for'
  edge_cases:
    - 'Subsystem file exists but is empty'
    - 'JSONL entries are malformed JSON'
    - 'gm-log dir from prior day (today's log not yet created)'
- id: run-ccsniff-5m-window
  subject: Run ccsniff on 5-min behavioral quality window
  status: pending
  description: Run `bun x ccsniff --since 5m --json` to capture behavioral violations (narrate-before-tool, skill invocation, memorize batching, etc.) for last 5 minutes. Parse JSON output and count violation categories.
  effort: small
  category: observability
  route_family: execution
  load: 0.7
  failure_modes: ['ccsniff not installed', 'no sessions in 5m window', 'JSON parse error']
  route_fit: examined
  authorization: witnessed
  blocking: ['plan-observability-improvements']
  blockedBy: []
  acceptance:
    - 'Successfully run ccsniff --since 5m --json'
    - 'Parse violation counts by category (narrate, skill, memorize, etc.)'
    - 'Compare against prior session baseline (145 narrate violations from CHANGELOG)'
  edge_cases:
    - 'No session activity in 5m window'
    - 'ccsniff returns error or no JSON output'
    - 'Baseline comparison unavailable (first run)'
- id: plan-observability-improvements
  subject: Plan observability guardrail improvements based on gm-log + ccsniff findings
  status: completed
  description: Combine gm-log subsystem coverage gaps + ccsniff behavioral violations. Identify actionable improvements: missing observability points, guard-rail rules not enforced, predictability gaps. Document each improvement with rationale and implementation sketch.
  effort: medium
  category: observability
  route_family: reasoning
  load: 0.8
  failure_modes: ['No clear gaps identified', 'improvements are speculative', 'improvements require external dependency']
  route_fit: examined
  authorization: witnessed
  blocking: ['execute-observability-improvements']
  blockedBy: ['inspect-gm-log-snapshot-5m', 'run-ccsniff-5m-window']
  acceptance:
    - 'List ≥1 observability improvement with clear rationale'
    - 'Each improvement specifies: affected subsystem/guardrail, current gap, proposed fix, implementation effort (small/medium/large)'
    - 'Improvements are reachable from this session (no external deps, no product decisions)'
  edge_cases:
    - 'Subsystems are operating correctly (no gaps found)'
    - 'Gaps require changes to external rs-* repos beyond gm harness'
  findings:
    - 'enhance-narrate-detection: gm-starter hook, small effort, low risk, reachable'
    - 'parallelize-exec-calls-planning: gm-execute skill, small effort, no risk, reachable'
    - 'infer-memorize-batching: rs-plugkit Rust code, blocked (excluded from Item 4 execution)'
- id: execute-observability-improvements
  subject: Execute all identified observability improvements
  status: blocked
  description: For each improvement from plan-observability-improvements: edit code, test witness, commit. Updates may touch gm, rs-plugkit, rs-exec, rs-codeinsight, rs-search, rs-learn as needed.
  effort: large
  category: observability
  route_family: execution
  load: 0.9
  failure_modes: ['Improvement requires external credential', 'change breaks existing tests', 'cross-repo change triggers CI failure']
  route_fit: examined
  authorization: witnessed
  blocking: ['identify-automatable-agentic-processes']
  blockedBy: ['plan-observability-improvements']
  acceptance:
    - 'All improvements executed, tested, committed, and pushed'
    - 'No regressions in existing observability output'
    - 'CI passes for all modified repos'
  edge_cases:
    - 'Improvement touches multiple repos (cascade)'
    - 'Change requires RS-* repo rebuild'
  blocker_reason: 'Both reachable improvements (enhance-narrate-detection, parallelize-exec-calls) require rs-plugkit hook code access. enhance-narrate-detection requires prompt-submit or post-tool-use hook modification (Rust). parallelize-exec-calls is guidance-level only (no code change, already in gm-execute SKILL.md).'
- id: identify-automatable-agentic-processes
  subject: Identify automatable agentic processes beyond current automation
  status: completed
  description: Review post-tool-use hook, prompt-submit hook, and agent harness code. Identify patterns that can be further automated: pre-tool-outcome classification, parallel exec call batching, memorize trigger inference, narrative detection, skill-transition prediction. Document each with rationale, risk, and implementation sketch.
  effort: medium
  category: infra
  route_family: reasoning
  load: 0.7
  failure_modes: ['No new automatable processes exist', 'automation reduces behavioral predictability', 'automation requires user configuration']
  route_fit: examined
  authorization: witnessed
  blocking: []
  blockedBy: ['execute-observability-improvements']
  acceptance:
    - 'List ≥1 automatable agentic process with clear rationale'
    - 'Each process specifies: current manual step, proposed automation, risk (none/low/medium), implementation sketch'
    - 'Automation does not reduce observability or predictability'
  edge_cases:
    - 'Automation requires user intent inference (ambiguous)'
    - 'Automation conflicts with existing disciplinary rules'
  findings:
    - 'pre-tool-outcome-classification: low risk, blocked on rs-plugkit'
    - 'exec-call-parallelization: no risk, reachable (guidance-level, documented in gm-execute PARALLEL SUBAGENTS)'
    - 'memorize-trigger-inference: medium risk, blocked on rs-plugkit'
    - 'narrative-detection-enforcement: low risk, blocked on rs-plugkit'
    - 'skill-transition-prediction: medium risk, blocked on rs-plugkit'
  summary: '4/5 processes require rs-plugkit Rust code access (out-of-scope). 1 process (exec-call-parallelization) is guidance-level and already documented.'
