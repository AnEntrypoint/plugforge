- id: transformers-js-host
  subject: Implement host_vec_embed + host_vec_search in freddie-host.js using @xenova/transformers
  status: completed
  description: |
    Add transformers.js (esm.sh/@xenova/transformers) lazy-load to freddie-host.js.
    Model: Xenova/all-MiniLM-L6-v2 (384-dim, ~20MB, runs in browser WASM worker).
    host_vec_embed(text_ptr, text_len) -> packed float32 array (384 floats * 4 bytes = 1536 bytes).
    host_vec_search: replace BM25 with cosine similarity over stored embeddings in holder.embeddings Map.
    Embeddings persisted in IDB namespace "vec-embeddings" (key = ns+\x00+key, value = Float32Array).
    On cold start (transformers not ready): fall back to BM25 for this call, emit log, continue.
    Wire host_vec_embed into makeGmEnvImports return object.
    Also wire LLM-inference path: if transformers unavailable, call provider API (text-embedding-ada-002 or
    voyage-embed via agent_keys ANTHROPIC_API_KEY/OPENAI_API_KEY) for embedding generation.
  effort: large
  category: feature
  route_family: execution
  load: 0.9
  failure_modes:
    - CORS block on esm.sh in GH Pages CSP
    - transformers.js WASM worker origin restriction
    - 20MB model download on first use (acceptable, cache after)
    - host_vec_embed called synchronously from wasm but transformers.js is async
  route_fit: examined
  authorization: witnessed
  blocking: []
  blockedBy: [vec-embed-host-import]
  acceptance:
    - window.__debug.gm.embed('hello world') returns Float32Array of length 384
    - host_vec_search returns cosine-ranked results not BM25-ranked
    - IDB namespace vec-embeddings populated after memorize
    - cold-start BM25 fallback logs [vec-embed cold-start fallback]

- id: treesitter-codeinsight
  subject: Replace chunk-split codeinsight indexer with web-tree-sitter AST parser
  status: in_progress
  description: |
    Load web-tree-sitter from cdn (esm.sh or jsDelivr) in freddie-host.js.
    Languages: JS/TS (tree-sitter-javascript.wasm), Python (tree-sitter-python.wasm), Rust (tree-sitter-rust.wasm).
    indexInstanceFs() replaces chunkText() with treeSitterChunk():
      - parse file with appropriate language parser
      - extract top-level nodes: function/class/method/struct/impl definitions
      - each node becomes one chunk: {path, nodeType, name, startLine, endLine, body}
    Chunks embedded via host_vec_embed and stored in codeinsight-vec namespace.
    codesearch verb: embed query, cosine search over codeinsight-vec embeddings.
    Fallback for unknown extensions: existing 40-line chunk split (not removed, used as fallback).
    treesitter wasm files served from /thebird/vendor/tree-sitter/ or CDN.
