- id: flatten-skill-discovery
  subject: Flatten SKILL.md files to skills/ directory root for bun x skills CLI discovery
  status: pending
  description: Move each skills/<name>/SKILL.md to skills/<name>.SKILL.md so bun x skills add finds them via standard glob
  effort: small
  category: feature
  route_family: execution
  load: 0.9
  failure_modes:
    - File glob pattern doesn't match expected naming
    - Nested directory index.js breaks due to path changes
  route_fit: examined
  authorization: witnessed
  blocking: []
