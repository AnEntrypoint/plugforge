- id: rs-plugkit-hook-tail-30s
  subject: Pre-tool-use Bash hook tails task logfile for ≤30s after exec spawn
  status: pending
  description: |
    rs-plugkit/src/hook/pre_tool_use.rs exec-dispatch path: after rs-exec
    returns task_id, immediately call tail RPC with max_wait_ms=30000. Return
    accumulated output to Claude Code as the bash result. If task is still
    running at 30s, append:
    ```
    [task <id> still running after 30s — partial output above]
    [tail more: exec:tail\n<id>] [match: exec:watch\n<id> --until-text/regex]
    [stop: exec:close\n<id>]
    [other running tasks: <list>]
    ```
    Strict wall-clock 30s, never idle-based.
  effort: large
  category: feature
  route_family: execution
  load: 0.9
  failure_modes: [hook-timeout-cascade, output-truncation, contract-divergence]
  blocking: []
  blockedBy: [rs-exec-tail-rpc]
  acceptance:
    - exec:bash 'sleep 0.05; echo done' returns 'done' synchronously (tail completes fast)
    - exec:bash 'sleep 60; echo done' returns at exactly 30s ±200ms with running-id message
    - the hook process never blocks longer than 30.5s wall clock

