- id: parity-browser-skill
  subject: Enable browser automation from skills (exec:browser)
  status: completed
  description: |
    Skills must support browser automation without plugkit hook infrastructure. Create lib/browser.js managing browser sessions via rs-exec (127.0.0.1:5000 default browser session API). Skills dispatch exec:browser verb to spool. Browser sessions persist across turns within a Claude session, closed only on real session-end.
  effort: medium
  category: infra
  route_family: boundary
  load: 0.7
  failure_modes:
    - browser session creation fails
    - session persistence lost
    - screenshot encoding broken
    - cleanup hangs
  route_fit: examined
  authorization: weak_prior
  blocking: [parity-git-skill-control]
  blockedBy: [parity-codeinsight-search-skill]
  acceptance:
    - lib/browser.js exports createSession(sessionId), sendCommand(sessionId, command), closeSession(sessionId), getScreenshot(sessionId)
    - Browser sessions keyed by CLAUDE_SESSION_ID
    - Sessions persist until real session-end (clear/logout/prompt_input_exit)
    - exec:browser verb supported in spool (in/browser/<N>.txt body format: start | stop | screenshot | click | type | navigate)
    - Screenshot base64 encoding preserved
    - Error handling surfaces browser unavailable gracefully

- id: parity-git-skill-control
  subject: Enable comprehensive git control from skills (commit, push, status, diff)
  status: completed
  description: |
    Skills must perform full git operations without hooks: commit, push, status, diff, log, checkout, rebase, cherry-pick. Create lib/git.js wrapping all git commands with Windows compatibility, proper auth handling, and error surfaces. Skills dispatch exec:bash for git operations, using lib/git.js utilities for parsing output and error recovery.
  effort: large
  category: infra
  route_family: execution
  load: 0.9
  failure_modes:
    - git push blocked by auth
    - Windows line ending issues
    - commit hooks fail
    - rebase conflicts unhandled
  route_fit: examined
  authorization: weak_prior
  blocking: [parity-hook-elimination]
  blockedBy: [parity-browser-skill]
  acceptance:
    - lib/git.js exports commit(message, files, sessionId), push(branch, sessionId), status(sessionId), diff(sessionId), log(sessionId), checkout(branch, sessionId), rebase(upstream, sessionId)
    - All functions handle Windows CRLF + Unix LF correctly
    - Git user configured via CLAUDE.md (lanmower, almagestfraternite@gmail.com)
    - Auth errors (no creds, blocked by org) surfaced clearly
    - Commit messages respect 72-char summary limit
    - Rebase conflicts preserved with user indication
    - Windows shell escaping correct

