- id: gm-skill-framework-bootstrap
  subject: Create daemon-bootstrap.js for standalone gm-skill daemon orchestration
  status: completed
  description: |
    gm-skill must provide a standalone daemon-bootstrap.js (no plugkit hooks dependency) that spawns and monitors acptoapi, rs-learn, and rs-codeinsight daemons via spool dispatch. Implements checkState, spawn, waitForReady, getSocket, shutdown exported functions per AGENTS.md contract. Writes JSON status to .gm/ and emits structured JSONL logs to ~/.claude/gm-log. Works for any platform (no hooks, pure Node.js).
  effort: medium
  category: infra
  route_family: boundary
  load: 0.9
  failure_modes:
    - daemon spawn fails on Windows vs Unix
    - socket reachability check hangs
    - stale daemon process not detected
    - race condition between multiple spawn attempts
  route_fit: examined
  authorization: witnessed
  blocking: []
  blockedBy: []
  acceptance:
    - daemon-bootstrap.js exports checkState(daemonName), spawn(daemonName, cmd), waitForReady(daemonName, host, port, timeoutMs), getSocket(daemonName), shutdown(daemonName)
    - Detects running daemons via platform-specific mechanism (tasklist on Windows, pgrep on Unix)
    - Verifies socket reachability before returning success
    - Emits JSONL events to ~/.claude/gm-log/<date>/daemon.jsonl
    - Writes status JSON to .gm/<daemon>-status.json
    - Handles missing/stale daemons gracefully (no crash on re-check)
    - Works in exec:nodejs spool without hook infrastructure

