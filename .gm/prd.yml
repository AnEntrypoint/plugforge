- id: freddie-runtime-in-thebird
  subject: Run the freddie agent runtime (xstate machine) as the in-page backend for thebird's chat frontend
  status: pending
  description: Currently thebird's chat dispatches directly to LLM providers via fs-stored keys, calling gm hooks as a bridge. The user wants the actual freddie agent runtime (C:/dev/freddie/src/agent/machine.js xstate state machine, tool dispatch, prompt construction, hook-orchestrated turn loop) embedded in-page as thebird's chat backend — not a side bridge. Build a freddie browser bundle via esbuild from C:/dev/freddie/src, ship to C:/dev/thebird/docs/freddie-runtime.js, rewire C:/dev/thebird/docs/freddie-chat.js so chat.send routes through freddie.machine.send instead of direct provider call. Expose window.__debug.freddie = { machine, snapshot, send }. Reuse the already-deployed gm plugkit auto-load for hook injection.
  effort: large
  category: feature
  route_family: boundary
  load: 0.85
  authorization: none
  blockedBy: []
  acceptance:
    - https://anentrypoint.github.io/thebird/ live page exposes window.__debug.freddie.machine with running xstate snapshot
    - chat.send('hello') transitions freddie machine state (page.evaluate before/after snapshot deltas witnessed)
    - freddie's tool dispatch executes against thebird's in-page fs/runners (no network call back to a freddie server)
    - each chat turn appends to window.__debug.gm.trajectory (in-page freddie loop fires gm hooks)
