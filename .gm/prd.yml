- id: border-system-design
  subject: Implement semantic border system with box-drawing characters
  status: completed
  description: Add box-drawing glyphs (┌─┐│└┘╔╗╚╝) for TUI authenticity. Support single/double/rounded border styles. Apply to cards, sections, input fields.
  effort: medium
  category: feature
  blocking: ['component-library-expansion', 'card-redesign', 'form-inputs-redesign']
  blockedBy: []
  acceptance:
    - Border variants: single-line, double-line, rounded, ASCII-only
    - Borders apply to .cc-card, .cc-section, .cc-msg, inputs
    - No layout shift - borders part of existing padding
    - Works in all modern browsers (fallback to solid for incomplete support)
    - CSS custom properties for border colors
  edge_cases:
    - Box-drawing chars not supported in very old browsers - graceful fallback to solid line
    - Corner characters must align perfectly with horizontal/vertical lines

- id: color-palette-upgrade
