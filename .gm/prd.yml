- id: rs-aggregate-retrieval
  subject: "Fan-out retrieval across default + every discipline when no @<name> given"
  status: "pending"
  description: "Read fan-out at three layers. (1) rs-learn Searcher RPC HTTP+ACP handler in src/main.rs: when discipline is None, enumerate <root>/.gm/disciplines/*/rs-learn.db, run search in parallel against default + each, merge-rank by score, prefix each EpisodeHit/fact with [discipline:<name>] (default db labelled [discipline:default]). (2) rs-search MCP search tool: when discipline None, enumerate <root>/.gm/disciplines/*/code-search/ index dirs, fan parallel, prefix results, merge-rank. (3) rs-plugkit exec:recall and exec:codesearch dispatch in src/hook/rs_learn.rs and codesearch path: same fan-out at plugkit layer (since plugkit calls Searcher directly via shared tokio Runtime). Strict isolation when @<name> present — only that discipline. Writes (memorize/ingest/index) without discipline still go to default only — aggregation is READ behavior. Extend prompt-submit auto-recall to include default alongside enabled disciplines."
  effort: "medium"
  category: "feature"
  route_family: "boundary"
  load: 0.85
  failure_modes:
    - missed default db when fanning
    - score normalization across heterogeneous indexes
    - parallel limit blowup with many disciplines
    - write accidentally fans (must remain default-only)
  route_fit: "examined"
  authorization: "witnessed"
  blocking:
    - cascade-and-publish
  blockedBy:
    - rs-learn-rpc-discipline
    - rs-search-mcp-discipline
    - rs-plugkit-discipline-flag
  files:
    - C:/dev/rs-learn/src/main.rs
    - C:/dev/rs-learn/src/acp/
    - C:/dev/rs-search/src/mcp.rs
    - C:/dev/rs-plugkit/src/hook/rs_learn.rs
    - C:/dev/rs-plugkit/src/hook/prompt_submit.rs
  acceptance:
    - "exec:recall foo (no @) returns merged hits prefixed [discipline:default] and [discipline:<name>] for each enabled discipline"
    - "exec:recall @kilo foo returns only [discipline:kilo] hits"
    - "exec:codesearch foo (no @) fans across all code-search index dirs + default"
    - "exec:memorize without @ writes only to default db (verified by inspecting only default rs-learn.db mtime changed)"
    - "rs-learn HTTP search endpoint without discipline returns aggregated"
