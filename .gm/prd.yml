  load: 0.8
  failure_modes:
    - tree-sitter WASM instantiation blocked by CSP
    - async parse inside sync indexInstanceFs (must become async)
    - missing language parsers for Go/C (fallback to line chunks)
  route_fit: examined
  authorization: witnessed
  blocking: []
  blockedBy: [transformers-js-host]
  acceptance:
