  status: completed
  description: Define complete color system: primary, secondary, success, warning, danger, info with proper contrast ratios. Map existing colors to semantic tokens.
  effort: medium
  category: design
  blocking: ['badge-redesign', 'message-type-colors', 'status-indicators']
  blockedBy: []
  acceptance:
    - CSS variables for all semantic colors (--color-primary, --color-success, etc)
    - WCAG AA contrast ratio minimum for all color pairs
    - Nord-inspired cool palette OR Catppuccin warm palette (decide during EXECUTE)
    - Applied to buttons, badges, messages, status indicators
    - Color scheme switchable via data-theme attribute
  edge_cases:
    - Must work in dark AND light modes if adding light variant later
    - Some users may have high-contrast mode enabled

- id: grid-background-pattern
