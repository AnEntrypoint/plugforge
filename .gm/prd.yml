  effort: small
  category: design
  blocking: []
  blockedBy: []
  acceptance:
    - Grid visible but subtle (low opacity ~0.03)
    - Fixed background, content scrolls normally
    - SVG or CSS-based, no performance impact
    - Accent color nodes at intersections (optional animation)
    - Respects prefers-reduced-motion
  edge_cases:
    - Performance on low-end devices - may need to disable on mobile
    - Must not interfere with text readability

