- id: parity-rs-learn-skill-access
  subject: Enable rs-learn (recall/memorize) access from skills via socket
  status: completed
  description: |
    Skills must access rs-learn daemon directly via socket (127.0.0.1:4801 default) without hook infrastructure. Create lib/learning.js with checkLearningAvailable(), queryLearning(query, discipline), persistLearning(fact, discipline). Integrate with daemon-bootstrap.js to ensure rs-learn is running. Skills can then exec:recall and exec:memorize through spool.
  effort: medium
  category: infra
  route_family: boundary
  load: 0.9
  failure_modes:
    - rs-learn socket not available
    - discipline isolation broken
    - memory writes not persisted
    - session threading lost
  route_fit: examined
  authorization: weak_prior
  blocking: [parity-codeinsight-search-skill]
  blockedBy: []
  acceptance:
    - lib/learning.js exports checkLearningAvailable(), queryLearning(query, discipline, sessionId), persistLearning(fact, discipline, sessionId)
    - daemon-bootstrap.js spawns rs-learn on 127.0.0.1:4801
    - Socket reachability verified before returning success
    - Discipline parameter scopes queries to named stores
    - Session ID threaded through all calls
    - Memory available check prevents silent failures
    - Error handling surfaces rs-learn unavailable without crashing

