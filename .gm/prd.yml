- id: rewrite-proactive-kill-process-path
  subject: Rewrite proactiveKillForNewInstall to scan running plugkit processes by image path
  status: pending
  description: |
    Replace the .daemon-version-file gate with a cross-platform process-listing scan.
    Windows: child_process.spawnSync('tasklist', ['/FI','IMAGENAME eq plugkit*','/FO','CSV','/NH']) to enumerate PIDs, then for each PID, resolve image path via spawnSync('powershell','-NoProfile','-Command','(Get-Process -Id <pid>).Path').
    Linux: read /proc/*/comm filtering plugkit*, then readlink /proc/<pid>/exe.
    macOS: ps -axo pid=,comm= filter plugkit, then ps -p <pid> -o command=.
    For each PID whose normalized image path is NOT path.resolve(finalPath), call killPid and log stderr.
    Always write .daemon-version as defense-in-depth marker at end.
    Invoke from ALL cache-resolution branches: cache hit, cache heal pre-lock, cache hit under lock, cache heal under lock, fresh install.
    All scans wrapped in try/catch — failure of the scan must NEVER block bootstrap. Each kill logged via obsEvent.
  effort: medium
  category: bug
  route_family: state
  load: 0.85
  failure_modes: [stale-state-served, observability-blind, cross-platform-divergence]
  route_fit: examined
  authorization: witnessed
  blocking: []
  blockedBy: []
  mutables: [win-process-path-mechanism, nix-process-path-mechanism, pid-file-coverage-gap, call-sites-needing-proactive-kill, self-pid-skip, daemon-version-file-defense-in-depth]
  acceptance:
    - bootstrap.js implements tasklist/Get-Process on Windows, /proc on Linux, ps on macOS
    - All cache-resolve branches in bootstrap() call proactiveKillForNewInstall(version, finalPath) before returning
    - Stale daemon kill emits stderr line `[bootstrap] killed stale daemon pid=<pid> path=<path> (current install: v<version>)`
    - .daemon-version written as defense-in-depth at end
    - obsEvent emits daemon.killed with {pid, oldPath, installedVersion, mechanism}
  edge_cases:
    - no plugkit processes running → no-op
    - tasklist/ps unavailable → catch, continue
    - permission denied → skip that pid
    - case-insensitive Win FS → normalize via path.resolve + toLowerCase

