- id: rs-plugkit-reminder-injection
  subject: Inject running-task reminder into every exec result returned to Claude
  status: pending
  description: |
    pre_tool_use.rs exec dispatch: after RPC returns, append a footer to the
    output sent back to Claude:
    ```
    [running tasks: id=N (cmd, elapsed); id=M (...) — close with exec:close\n<id>]
    ```
    Empty list → omit footer entirely (no noise). Source: running_task_ids
    field already in every RPC response (see rs-exec-task-list-rpc).
    Footer also injected on tail/watch/wait/sleep/status/close responses —
    every interaction with the execution platform.
  effort: medium
  category: observability
  route_family: observability
  load: 0.7
  blocking: []
  blockedBy: [rs-exec-task-list-rpc]
  acceptance:
    - exec:bash 'echo hi' with 0 other running tasks → no footer
    - exec:bash 'echo hi' with 2 other running tasks → footer with both ids + close hint
    - footer fires on every exec verb (tail/watch/wait/sleep/status/close included)

