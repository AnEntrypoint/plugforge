

- id: acptoapi-runner
  subject: Set rs-plugkit to spawn acptoapi and ACP agents if not running
  status: completed
  description: Configure rs-plugkit bootstrap to spawn "bun x acptoapi@latest" if 127.0.0.1:4800 is not already listening. On Windows, auto-spawn available ACP agents (opencode, kilo-code, codex, gemini-cli, qwen-code) invisibly as subprocesses connected to acptoapi. Use netstat/lsof to detect existing listener before spawning. Spawn as daemon managed by rs-plugkit session lifecycle. Gracefully skip agents not installed on system.
  effort: large
  category: infra
  route_family: execution
  load: 0.8
  failure_modes:
    - Port already in use by non-acptoapi process - need safe conflict detection
    - Daemon crash should trigger restart
    - Cleanup on session end
    - Missing agents should not block acptoapi startup
    - ACP agent spawn should be invisible (no console windows on Windows)
  route_fit: examined
  authorization: witnessed
  blocking: []
  blockedBy: []
  acceptance:
    - rs-plugkit checks 127.0.0.1:4800 listening before spawning
    - Spawns "bun x acptoapi@latest" as background daemon if not listening
    - Auto-detects and spawns available ACP agents (opencode, kilo-code, codex, gemini-cli, qwen-code)
    - ACP agents spawn invisibly on Windows (no console window)
    - Daemon lifecycle tied to rs-plugkit session
    - No error if acptoapi or any agent already running
    - Gracefully skips agents not found on system
  edge_cases:
    - Race condition on port bind during spawn
    - Cleanup of orphaned processes on ungraceful exit
    - Agent binary detection across different install locations (PATH, npm global, scoop, cargo)

