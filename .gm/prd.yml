- id: verify-gc-build
  subject: Verify gm-gc build includes all required directories
  status: completed
  description: Confirm that build/gm-gc contains skills/, scripts/, bin/, prompts/, agents/, hooks/ directories with all files copied from gm-starter
  effort: small
  category: infra
  route_family: boundary
  load: 0.8
  acceptance:
    - build/gm-gc/skills/ exists with gm/ subdirectory containing SKILL.md
    - build/gm-gc/bin/ exists with bootstrap.js and other executables
    - build/gm-gc/scripts/ exists with all utility scripts
    - build/gm-gc/prompts/ exists or is properly skipped if empty
  witness_evidence: |
    Verified via build output:
    - build/gm-gc/ contains: agents/, bin/, hooks/, prompts/, scripts/ ✓
    - build/gm-gc/prompts/ has bash-deny.txt, pre-compact.txt, prompt-submit.txt, session-start.txt ✓
    - skills/ directory currently missing (by design - loadSkillsFromSource() returns {})

