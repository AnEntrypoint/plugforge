items:

  - id: rs-exec-stdout-isolation
    subject: Per-task OwnedPipe stdout isolation to stop background-task leakage
    status: pending
    repo: AnEntrypoint/rs-exec
    fsm: task
    description: |
      Output from parallel background tasks (exec:browser, exec:nodejs, etc.)
      leaks into foreground task's stdout when a task is backgrounded >15s and
      another foreground task runs concurrently. See task FSM invariants.
    acceptance:
      - two concurrent tasks (A slow/bg, B fast/fg) produce disjoint outputs
      - backgroundTaskId notifications on control-channel file, not inline
      - regression test in rs-exec/tests/ asserts isolation

  - id: rs-exec-browser-fsm
    subject: Browser FSM implementation with Chrome zombie reaper
    status: pending
    repo: AnEntrypoint/rs-exec
    fsm: browser
    description: |
      Implements the states/transitions in fsm/browser.md. Replaces ad-hoc
      browser spawning/killing. Startup-only orphan reaper scans chrome.exe
      whose parent is not a live runner. Never kills InUse. Idempotent cleanup.
    acceptance:
      - session end kills chrome within 5s (observed via process enumeration)
      - pre-existing zombie chrome killed on runner startup
      - chrome in InUse state never killed mid-task
      - profile SingletonLock detected; emits BROWSER_PROFILE_LOCKED instead of 20-retry burn
      - FSM transitions logged to $TMPDIR/cc-browser-fsm.log

  - id: rs-exec-session-fsm
    subject: Session FSM (Active/Idle/Closing/Dead) with drain-before-close
    status: pending
    repo: AnEntrypoint/rs-exec
    fsm: session
    acceptance:
      - session-cleanup drains tasks BEFORE browser Closing
      - double session-cleanup is no-op
      - idle timeout transitions to Closing after SESSION_IDLE_MS
      - state logged to $TMPDIR/cc-session-fsm.log

  - id: rs-exec-daemon-fsm
    subject: Daemon FSM with crash-flapping guard and explicit port-bind logging
    status: pending
    repo: AnEntrypoint/rs-exec
    fsm: daemon
    description: |
      Log FIXED_PORT vs fallback branch on every Listening transition. Crash-
      flapping guard: 3 crashes in 30s → 60s cooldown. Stale port-file detector
      checks pid aliveness before reuse.
    acceptance:
      - port-bind branch visible in plugkit --version --deps
      - 3 rapid crashes trigger DAEMON_FLAPPING cooldown
      - stale port file does not cause cascading failures

  - id: rs-plugkit-version-deps
    subject: plugkit --version --deps prints embedded rs-exec/rs-search/rs-codeinsight SHAs
    status: pending
    repo: AnEntrypoint/rs-plugkit
    description: |
      Eliminates "which rs-exec did this binary build against?" confusion that
      cost multiple sessions. SHAs captured at build time via build.rs reading
      Cargo.lock.
    acceptance:
      - `plugkit --version --deps` outputs rs-exec=<sha> rs-search=<sha> rs-codeinsight=<sha>
      - doctor subcommand includes same info

