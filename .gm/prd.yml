- id: audit-gm-log-1h-window
  subject: Audit gm-log for 1h window, identify improvements
  status: pending
  description: Parse ~/.claude/gm-log/2026-05-02/*.jsonl files. Extract error patterns, latency metrics, subsystem health. Identify new improvement opportunities for rs-plugkit, rs-exec, rs-codeinsight, rs-search, rs-learn. Validate via ccsniff on 1h window (not just 5m).
  effort: medium
  category: observability
  route_family: observability
  load: 0.8
  failure_modes: ['missing log files', 'unrecognized error patterns', 'ccsniff timeout']
  route_fit: dominant
  authorization: witnessed
  blocking: [discover-automation-opportunities]
  blockedBy: []
  acceptance:
    - gm-log subsystems parsed and error count extracted
    - latency metrics (rs_search, rs_codeinsight, rs_learn) measured vs prior baselines
    - ccsniff clean on 1h window OR violations identified and root-caused
    - new patterns discovered or confirmed no regressions
  edge_cases:
    - concurrent session writes to same log files
    - partial day (e.g. audit at 00:15)
    - no new errors (green baseline)
- id: discover-automation-opportunities
  subject: Discover new agentic processes ready for flawless automation
  status: completed
  description: Scan gm-log and code for repetitive manual operations or guard-railed decision points that can be moved from prompt-submit hook to autonomous background processing. Examples: auto-recall on every prompt (done), auto-search on session-start (done), background memorize (done). Find next candidate.
  effort: medium
  category: infra
  route_family: execution
  load: 0.6
  failure_modes: ['no new candidates found', 'candidate requires user input', 'candidate breaks existing flow']
  route_fit: examined
  authorization: witnessed
  blocking: []
  blockedBy: [audit-gm-log-1h-window]
  acceptance:
    - scan complete: gm-log patterns + code paths reviewed
    - candidates enumerated (0 or more)
    - each candidate: acceptance criteria stated, blockers named, or accepted as out-of-scope
  edge_cases:
    - candidate discovered but blocked by external service
    - candidate requires new tool
    - edge cases from audit surface new unknowns
  results:
    - '1. auto-tidyup-no-memorize-marker (HIGH-PRIORITY, NO BLOCKER): Move .gm/no-memorize-this-turn marker cleanup from sync prompt-submit to session-end or post-exec'
    - '2. auto-turn-state-cleanup (MEDIUM, BLOCKER: session-end hook): Batch turn-state.json resets at session-end instead of per-prompt'
    - '3. auto-batch-ccsniff-validation (MEDIUM, BLOCKER: rs-exec worker): Aggregate 5m windows into hourly buckets, validate async'
    - '4. auto-cache-invalidation-signal (MEDIUM, BLOCKER: queue/worker): Emit cache signals to background, non-blocking critical path'
    - '5. auto-prune-old-gm-logs (LOW, BLOCKER: session-end hook or cron): Auto-cleanup of logs >14 days old'