- id: fix-session-id-env-var
  subject: Fix SESSION_ID propagation across the board
  status: witnessed
  description: Ensure SESSION_ID is passed through all execution paths in gm-skill and rs-plugkit
  effort: small
  category: bug
  route_family: execution
  load: 0.9
  failure_modes: [task isolation failure, wrong session attribution]
  route_fit: examined
  authorization: witnessed
  acceptance:
    - SESSION_ID env var is read and passed in hook-bridge.js startWatcher (line 145)
    - SESSION_ID env var is read and passed in hook-replacer.js startSpoolWatcher (line 69)
    - SESSION_ID env var is read and passed in lib/index.js startSpoolWatcher (line 44)
    - SESSION_ID env var is read and passed in hook-replacer.js processSpoolFile (line 182)
    - SESSION_ID env var is read in spool.rs dispatch_to_exec_rpc (line 231)
    - SESSION_ID env var is read in rs-plugkit main.rs Cmd::Bash handler (line 1027)
  edge_cases:
    - SESSION_ID not set (uses default)
    - Empty SESSION_ID value
    - SESSION_ID changes mid-session

- id: implement-file-watcher-automation
  subject: Replace hook-based execution with file watcher pattern in gm-skill
  status: witnessed
  description: gm-skill must provide file watcher automation that replaces post-write hooks with spool watching
  effort: large
  category: feature
  route_family: boundary
  load: 0.9
  failure_modes: [execution not triggered, stale output, missing sessions]
  route_fit: examined
  authorization: witnessed
  acceptance:
    - Spool watcher starts automatically when gm skill chain begins
    - File writes to .gm/exec-spool/in/* trigger execution automatically
    - Output appears in .gm/exec-spool/out/* with no manual intervention
    - Session isolation works with SESSION_ID propagation
  edge_cases:
    - Concurrent sessions
    - Watcher not available (fallback to polling)
    - Binary not ready (graceful degradation)

- id: make-rs-plugkit-cli-standalone
  subject: Allow `bun x rs-plugkit` to bootstrap plugkit binary from anywhere
  status: witnessed
  description: rs-plugkit.js must be invocable as a standalone tool that downloads and runs the correct plugkit binary for the system
  effort: medium
  category: feature
  route_family: execution
  load: 0.7
  failure_modes: [binary not found, version mismatch, platform not supported]
  route_fit: examined
  authorization: witnessed
  acceptance:
    - `bun x rs-plugkit` works from any directory without local files
    - Binary is downloaded to ~/.claude/gm-tools/ if missing or outdated
    - Version is verified against plugkit.version from releases
    - Works cross-platform (win32, darwin, linux x64/arm64)
  edge_cases:
    - Network failure (graceful error)
    - Insufficient permissions
    - Corporate proxy