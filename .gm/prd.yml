  - id: rs-search-architecture-redesign
    subject: Redesign rs-search embedding architecture — git-hash-keyed diff/text embeddings, location-only chunk embeddings
    status: pending
    repo: AnEntrypoint/rs-search
    description: |
      Two storage classes:
      1. Diff/text embeddings keyed by git commit hash — agent retrieves by hash.
         Per push: index staged diff + commit message text; store embedding with hash only.
      2. Code-chunk embeddings keyed by LOCATION only (path + line range) — payload
         (chunk text) is NOT stored. Retrieval reads source on demand from the
         on-disk file using the location. Saves significant storage.

      Performance parity with codebasesearch bun version (see recent commits
      d2ea7e0, a7ffaf9, 7f35bdf, 53826ad). Cross-OS/device compatibility.

      Upstream patterns to port:
      - Dynamic backend probing + cache (CUDA → DirectML → WebGPU → WASM; probe,
        cache fastest adapter). Rust side: candle CUDA/MKL features behind
        runtime detection; fallback chain.
      - Pipelined embed <-> store (concurrent batch N embed with batch N-1 write).
      - Batched mtime index writes (in-memory cache, flush on close).
      - Float32 slice reuse (subarray-equivalent; Rust can use &[f32] slices).
      - Probe-and-cache fastest adapter between runs; dispose models between
        adapter probes to avoid VRAM OOM.

      Delivers: vector AND bm25 both working, most performant cross-platform rs-search.
    acceptance:
      - Push indexes diff+commit-message with git SHA key only; retrieval hits by SHA
      - Code chunks stored WITHOUT content; search returns location, content read from disk
      - vector + bm25 both return useful results on test corpus
      - Pipelined indexing: indexing throughput ≥ 80% of codebasesearch bun version
      - Runtime backend probe: CUDA / DirectML / CPU fallback, cached
      - Cross-OS: Windows, Linux, macOS builds green

