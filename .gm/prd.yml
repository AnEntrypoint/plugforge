- id: marker-file-contract
  subject: Define and implement marker file contract for skill-driven gates
  status: pending
  description: Document and implement the marker file contract that replaces hook-based gate enforcement
  effort: small
  category: infra
  route_family: state
  load: 0.6
  failure_modes: ["marker files not written", "marker files not read", "stale markers"]
  route_fit: dominant
  authorization: weak_prior
  blocking: []
  blockedBy: ["hook-behavior-mapping"]
  acceptance:
    - .gm/needs-gm: written by session-start, deleted by prompt-submit when no PRD
    - .gm/gm-fired-this-turn: written by pre-tool-use after gm skill runs, deleted by prompt-submit
    - .gm/mutables.yml: written by planning, updated by gm-execute, read by pre-tool-use gate
    - .gm/turn-state.json: written by post-tool-use, read by gm-complete
    - .gm/prd.yml: written by planning, deleted when empty
  edge_cases:
    - Marker file corruption
    - Concurrent session marker conflicts
    - Stale markers from crashed sessions

- id: skill-chain-enforcement
  subject: Implement skill chain enforcement without hooks
  status: pending
  description: Ensure the PLAN→EXECUTE→EMIT→VERIFY→COMPLETE chain is enforced through skill transitions and marker files
  effort: large
  category: feature
  route_family: state
  load: 0.9
  failure_modes: ["chain broken", "skills skipped", "phase transitions incorrect"]
  route_fit: dominant
  authorization: weak_prior
  blocking: []
  blockedBy: ["hook-behavior-mapping", "skill-gate-enforcement"]
  acceptance:
    - planning skill writes PRD and transitions to gm-execute
    - gm-execute resolves all mutables before transitioning to gm-emit
    - gm-emit writes files and verifies from disk before transitioning to gm-complete
    - gm-complete verifies PRD empty, git clean, pushed before transitioning to update-docs
    - Any new unknown triggers snake back to planning
  edge_cases:
    - Agent skips skill transition
    - Phase transition without gate clearance
    - New unknown discovered in EMIT phase

