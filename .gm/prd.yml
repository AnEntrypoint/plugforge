- id: llm-learn-flow
  subject: Wire rs-learn memorize/recall through LLM inference for summarization and embedding
  status: in_progress
  description: |
    When agent calls memorize verb with text >200 chars:
      1. Call LLM (via directProviderFallback chat tool, same provider priority) to summarize to <100 words
      2. Embed summary via host_vec_embed
      3. Store both raw text and summary+embedding
    recall verb:
      1. Embed query via host_vec_embed
      2. Cosine search over rs-learn-vec embeddings
      3. Re-rank top-10 hits by calling LLM: "Given query: X, rank these results: ..."
      4. Return re-ranked top-k
    This gives recall the same quality as desktop rs-learn (candle embeddings + inference).
    Implement in dispatch wrapper layer in freddie-host.js (not in wasm_dispatch.rs changes).
    New dispatch intercept: before passing to wasm dispatch_verb, intercept memorize/recall.
    BLOCKED: IDB kv_put must work first so embeddings persist.
  effort: large
  category: feature
  route_family: reasoning
  load: 0.8
  failure_modes:
    - LLM call adds latency to every memorize (mitigate: fire async, don't block)
    - Re-ranking doubles recall latency (mitigate: only when >3 results)
    - Provider keys not set (graceful: skip LLM steps, use raw embedding only)
  route_fit: examined
  authorization: witnessed
  blocking: []
  blockedBy: [transformers-js-host, fix-idb-memorize-kv-put]
  acceptance:
    - memorize with long text stores LLM summary alongside raw
    - recall with embedding returns cosine-ranked results
    - LLM re-ranking fires when >=3 results and provider key available
    - all LLM calls go through directProviderFallback priority chain

