current_state:
  rs_plugkit:
    hooks_exist: true
    hook_modules: ["session_start.rs", "pre_tool_use.rs", "prompt_submit.rs", "post_tool_use.rs", "stop.rs", "session_end.rs"]
    spool_watcher_implemented: true
    wasm_feature_flag: true
    wasm_dependencies_conditional: true
    ci_matrix: ["win32", "linux", "darwin", "aarch64"]

  gm_starter:
    spool_dispatch_exists: true
    hook_generation_in_platforms: true
    lib_modules: ["spool-dispatch.js", "daemon-bootstrap.js", "git.js", "codeinsight.js", "learning.js", "browser.js"]

  rs_learn:
    provider_mechanism: "bun x acptoapi or npx"
    acptoapi_local: false

  acptoapi:
    local_repo_exists: true
    free_agents: ["kilo", "opencode"]

  agentsmd:
    hook_references: true
    needs_spool_docs: true

design_decisions:
  marker_files:
    - ".gm/prd.yml - current PRD, mutable witness, phase state"
    - ".gm/session-{id}.json - per-session state, timestamp, stage tracking"
    - ".gm/needs-gm - gate marker: PRD exists, gm must run"
    - ".gm/gm-fired-{id} - gate marker: gm ran, tools permitted"
    - ".gm/mutables.yml - mutable work items with witness evidence"
    - ".gm/daemon-state.json - rs-learn/acptoapi daemon status"

  spool_dispatch:
    - "Bash tool → .gm/exec-spool/in/runner/<N>.txt → rs-exec processes → out/<N>.json"
    - "No hook interception, direct spool handler execution"
    - "Stdout/stderr streamed line-by-line to out/<N>.out + out/<N>.err"

  acptoapi_fallback_chain:
    1: "Local acptoapi (127.0.0.1:4800)"
    2: "Spawn acptoapi via spool if unavailable"
    3: "Try kilo (free, no auth)"
    4: "Try opencode (free, no auth)"
    5: "Fallback Anthropic SDK"

  wasm_invocation:
    - "Download from GitHub Releases to ~/.claude/gm-tools/plugkit.wasm"
    - "Sha256 verify via manifest"
    - "Invoke via: bun run plugkit.wasm OR node plugkit.wasm"
    - "Single build per repo (wasm32-unknown-unknown target only)"

next_step: "Execute PLAN phase: design marker schema, spool dispatcher, acptoapi integration"

