- id: gm-skill-gm-skill-index
  subject: Implement core skills (gm, planning, gm-execute, gm-emit, gm-complete, update-docs) as index.js modules
  status: pending
  description: |
    Each skill/ directory must have index.js that:
    1. Reads SKILL.md from the skill directory
    2. Implements the skill's logic (dispatch to subagents or direct execution)
    3. Returns end-to-end JSON on stdout (nextSkill, context, phase) per gm SKILL.md
    4. Handles errors and timeouts without crashing
    5. Routes through spool for any code execution (exec:nodejs, exec:bash)

    gm → planning → gm-execute → gm-emit → gm-complete → update-docs, with cycle-back to planning on unknowns.
  effort: large
  category: feature
  route_family: reasoning
  load: 1.0
  failure_modes:
    - skill invocation infinite loops
    - JSON output malformed or missing nextSkill
    - context not passed between skills
    - mutable resolution never completes
    - git operations fail (push, commit)
    - async operations timeout
  route_fit: examined
  authorization: weak_prior
  blocking: []
  blockedBy: [gm-skill-package-structure]
  acceptance:
    - gm/index.js parses request, invokes planning as first skill, returns nextSkill="planning"
    - planning/index.js runs ORIENT, mutable discovery, PRD generation, returns nextSkill="gm-execute"
    - gm-execute/index.js parallelizes independent PRD items via subagents, returns nextSkill="gm-emit" or "planning" (on unknowns)
    - gm-emit/index.js writes .gm/ files, verifies from disk, returns nextSkill="gm-complete"
    - gm-complete/index.js verifies git state, checks tests, returns nextSkill="update-docs" or null
    - update-docs/index.js updates README + AGENTS.md + site, commits and pushes, returns nextSkill=null
    - All skills respect timeouts and emit clear error messages
    - end-to-end JSON always includes { nextSkill, context, phase }

