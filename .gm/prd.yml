- id: identify-automatable-agentic-processes
  subject: "Identify additional automatable agentic processes"
  status: completed
  description: "Review gm-log and ccsniff results, scan hook/skill architecture, and check recent turn-state patterns. Identify any repetitive agent workflows, manual state management, or decision gates that could be automated without risk. Document candidates with automation strategy."
  effort: medium
  category: infra
  route_family: reasoning
  load: 0.5
  failure_modes:
    - "no clear automation candidates found"
    - "proposed automation adds risk or complexity"
  route_fit: examined
  authorization: witnessed
  blocking: []
  blockedBy:
    - inspect-gm-log-5min
    - run-ccsniff-5min-baseline
  acceptance:
    - "list of 3+ candidates identified with rationale, risk assessment, and proposed implementation sketch"
  edge_cases:
    - "candidates already implemented"
    - "automation requires external service changes"
  automation_candidates:
    - id: pre-tool-outcome-classification
      title: "Pre-tool-use outcome classification automation"
      rationale: "Hook dispatch captures tool decision but not explicit rejection reason. Automating outcome inference from stderr pattern (permission denied keywords, timeout signatures) would improve signal-to-noise in turn-state sentinel and reduce asking-user-mid-chain violations through predictive early-exit."
      implementation: "Add outcome classifier to rs-plugkit/src/hook/pre_tool_use.rs::dispatch(). Parse stderr for rejection patterns (permission-denied regex, timeout, resource-limit keywords). Emit outcome field (granted|denied|deferred) in pre-tool-use.tool event."
      risk: "Low. Classification is pattern-based; false-positives = extra logging, not behavioral change."
    - id: parallel-exec-call-batching
      title: "Parallel exec-call batching orchestration"
      rationale: "Turn-state tracks execCallsSinceMemorize as simple counter. Hook timing shows exec calls cluster in 1–3 waves per turn. Auto-batching independent exec calls would reduce wall-clock per turn by ~30–40% (from avg 45ms/dispatch → 90–120ms/wave)."
      implementation: "Extend turn-state.json to track exec-call dependency graph (output paths vs input refs). At prompt-submit time, analyze pending execs and emit batch recommendations to hook layer. Hook pre-tool-use filters tool.name=='Bash' && matches(batchId) → queue instead of fire immediately, emit when batch-trigger fires."
      risk: "Medium. Requires dependency graph inference; mis-classified dependencies could cause write races. Mitigated by opt-in flag and extensive logging."
    - id: memorize-trigger-inference
      title: "Memorize trigger inference from exec output classification"
      rationale: "Current rule requires manual end-of-turn scan. Hook layer already captures exec output in exec.jsonl. Auto-classifying output for high-signal facts (root-cause, turned-out, culprit, non-obvious patterns) and auto-spawning memorize would reduce un-memorized resolutions and strengthen learning loop."
      implementation: "Add output classifier to rs-exec/src/emit.rs or post_tool_use hook. Pattern-match exec.out against fact-trigger regex (root cause, turned out, culprit, fix was, gotcha). On match, emit classified-fact event with confidence score. rs-plugkit post_tool_use hook reads event, spawns memorize Agent if confidence > threshold."
      risk: "Low-medium. Auto-spawn could emit low-signal facts, but memorize classifier rejects them anyway. Monitor per-turn spawn rate to detect noise."