- id: p1-watcher-status-json
  subject: Watcher writes rich .status.json each tick
  status: pending
  description: |
    rs-exec/src/spool.rs::run_daemon — each tick (after watch_once) writes
    .gm/exec-spool/.status.json with {pid, binary_version (CARGO_PKG_VERSION),
    started_at ISO, last_tick_at ISO, tasks_dispatched_this_session,
    last_dispatched_task {id,lang_or_verb,input_path,at}, pending_in_inbox,
    errors_last_5}. Counter incremented in dispatch_entry path. Errors ring
    bounded to last 5.
  effort: medium
  category: feature
  route_family: observability
  load: 0.6
  acceptance:
    - .status.json present and refreshed each tick (mtime advances)
    - pending_in_inbox counts files under in/<lang>/*
    - last_dispatched_task updates on dispatch
  blockedBy: []

- id: p2-bootstrap-pin-verify
  subject: Bootstrap probes cached binary --version and refetches on mismatch
  status: pending
  description: |
    gm-starter/bin/bootstrap.js cache-hit + cache-heal branches around lines
    328-360: before returning finalPath, spawnSync `${finalPath} --version`,
    parse, compare to ${version}. On mismatch log loudly and fall through to
    network fetch. Verify sha against manifest also on return path. Enrich
    cache-hit/heal log lines with pin-match assertion.
  effort: medium
  category: bug
  route_family: grounding
  load: 0.8
  acceptance:
    - Cache-hit emits "cache hit vX (matches pin) → using ..."
    - Mismatch emits loud line and forces re-fetch path
    - Sha verified against manifest on return path

