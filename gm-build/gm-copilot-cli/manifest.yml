name: gm
version: 2.0.456
description: State machine agent with hooks, skills, and automated git enforcement
author: AnEntrypoint

repository:
  url: https://github.com/AnEntrypoint/gm-copilot-cli
  type: git

license: MIT

keywords:
  - ai
  - state-machine
  - agent

activation:
  on_load: true
  auto_activate: true

commands:
  - name: gm:activate
    description: Activate state machine
  - name: gm:analyze
    description: Analyze code
  - name: gm:search
    description: Semantic search
  - name: gm:refactor
    description: Refactor code

api:
  version: 1.0.0
  min_gh_version: 2.45.0

permissions:
  - read:environment
  - read:project
  - write:project

configuration:
  settings:
    - name: enabled
      type: boolean
      default: true
    - name: auto_activate
      type: boolean
      default: true
    - name: log_level
      type: string
      enum: [debug, info, warn, error]
      default: info
