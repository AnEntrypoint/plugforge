id = "gm"
name = "GM"
description = "State machine agent with hooks, skills, and automated git enforcement"
version = "2.0.456"
schema_version = 1
authors = ["AnEntrypoint"]
repository = "https://github.com/AnEntrypoint/gm-zed"

[package]
category = ["AI", "Code Completion"]
description = "AI state machine with semantic code search, autonomous agents, and MCP integration. Use natural language prompts like 'Find auth validation' to explore your codebase."

[commands]
gm.activate = "Activate GM state machine"
gm.deactivate = "Deactivate GM state machine"
gm.showState = "Show state machine status"
gm.toggleAssistant = "Toggle AI assistant"

[settings]
gm.enabled = { description = "Enable GM extension", type = "boolean", default = true }
gm.autoActivate = { description = "Auto-activate on startup", type = "boolean", default = true }
gm.logLevel = { description = "Log level", type = "string", enum = ["debug", "info", "warn", "error"], default = "info" }
gm.llm = { description = "LLM model", type = "string", default = "claude-3-5-sonnet" }
gm.temperature = { description = "Temperature for LLM", type = "number", default = 0.7 }
gm.contextWindow = { description = "Context window size", type = "integer", default = 200000 }
