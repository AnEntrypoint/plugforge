name: Track NPM Downloads

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Fetch npm downloads (last 30d)
        run: |
          mkdir -p docs/api
          OUT=docs/api/npm-downloads.json
          PKGS=(gm-cc gm-gc gm-oc gm-kilo gm-codex gm-copilot-cli gm-qwen gm-hermes gm-vscode gm-cursor gm-zed gm-jetbrains)
          END=$(date -u +%Y-%m-%d)
          START=$(date -u -d '29 days ago' +%Y-%m-%d)
          declare -A SERIES
          declare -A TOTAL
          for p in "${PKGS[@]}"; do
            R=$(curl -s "https://api.npmjs.org/downloads/range/${START}:${END}/${p}")
            ERR=$(echo "$R" | jq -r '.error // empty')
            if [ -n "$ERR" ]; then
              echo "skip $p: $ERR"
              SERIES[$p]='[]'
              continue
            fi
            DAILY=$(echo "$R" | jq -c '[.downloads[] | {date: .day, count: .downloads}]')
            SERIES[$p]="$DAILY"
            while IFS=$'\t' read -r d c; do
              TOTAL[$d]=$(( ${TOTAL[$d]:-0} + c ))
            done < <(echo "$R" | jq -r '.downloads[] | [.day,.downloads] | @tsv')
          done
          PACKAGES_JSON=$(jq -n '{}')
          for p in "${PKGS[@]}"; do
            PACKAGES_JSON=$(echo "$PACKAGES_JSON" | jq --arg k "$p" --argjson v "${SERIES[$p]:-[]}" '.[$k]=$v')
          done
          TOTALS_JSON='[]'
          for d in $(echo "${!TOTAL[@]}" | tr ' ' '\n' | sort); do
            TOTALS_JSON=$(echo "$TOTALS_JSON" | jq --arg d "$d" --argjson c "${TOTAL[$d]}" '. + [{date:$d,count:$c}]')
          done
          GRAND=$(echo "$TOTALS_JSON" | jq '[.[].count] | add // 0')
          jq -n --arg gen "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                --argjson packages "$PACKAGES_JSON" \
                --argjson totals "$TOTALS_JSON" \
                --argjson grand "$GRAND" \
                '{generated:$gen, range_days:30, total_30d:$grand, packages:$packages, totals:$totals}' > "$OUT"
          echo "wrote $OUT (total_30d=$GRAND)"

      - name: Commit if changed
        run: |
          if git diff --quiet docs/api/npm-downloads.json; then
            echo "no change"
            exit 0
          fi
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/api/npm-downloads.json
          git commit -m "chore: update npm downloads"
          git push
