name: Publish gm-skill

on:
  push:
    branches: [main]
    paths:
      - 'gm-skill/**'
      - '.github/workflows/gm-skill-publish.yml'
  workflow_dispatch:

concurrency:
  group: gm-skill-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.publish.outputs.published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Check current version
        id: check-version
        run: |
          CURRENT_VERSION=$(jq -r '.version' gm-skill/package.json)
          PUBLISHED_VERSION=$(npm view gm-skill version 2>/dev/null || echo "0.0.0")
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"
          echo "Published version: $PUBLISHED_VERSION"

      - name: Auto-bump version if needed
        id: bump-version
        run: |
          CURRENT=${{ steps.check-version.outputs.current }}
          PUBLISHED=${{ steps.check-version.outputs.published }}

          IFS='.' read -r CURR_MAJOR CURR_MINOR CURR_PATCH <<< "$CURRENT"
          IFS='.' read -r PUB_MAJOR PUB_MINOR PUB_PATCH <<< "$PUBLISHED"

          CURR_PATCH=${CURR_PATCH:-0}
          PUB_PATCH=${PUB_PATCH:-0}

          SHOULD_BUMP=false
          if [ "$PUB_MAJOR" -gt "$CURR_MAJOR" ] || \
             ([ "$PUB_MAJOR" -eq "$CURR_MAJOR" ] && [ "$PUB_MINOR" -gt "$CURR_MINOR" ]) || \
             ([ "$PUB_MAJOR" -eq "$CURR_MAJOR" ] && [ "$PUB_MINOR" -eq "$CURR_MINOR" ] && [ "$PUB_PATCH" -ge "$CURR_PATCH" ]); then
            SHOULD_BUMP=true
          fi

          if [ "$SHOULD_BUMP" = "true" ]; then
            NEW_PATCH=$((PUB_PATCH + 1))
            NEW_VERSION="${PUB_MAJOR}.${PUB_MINOR}.${NEW_PATCH}"
            echo "Bumping version from $CURRENT to $NEW_VERSION"
            jq ".version = \"$NEW_VERSION\"" gm-skill/package.json > gm-skill/package.json.tmp
            mv gm-skill/package.json.tmp gm-skill/package.json
            echo "bumped=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version $CURRENT >= published $PUBLISHED, no bump needed"
            echo "bumped=false" >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push version bump if needed
        if: steps.bump-version.outputs.bumped == 'true'
        run: |
          git config user.name "lanmower"
          git config user.email "almagestfraternite@gmail.com"
          git add gm-skill/package.json
          git commit -m "chore: bump gm-skill version to ${{ steps.bump-version.outputs.new_version }} [skip ci]"
          git push origin HEAD:main

      - name: Publish gm-skill to npm
        id: publish
        run: |
          PACKAGE_VERSION=$(jq -r '.version' gm-skill/package.json)
          PUBLISHED=false

          echo "Publishing gm-skill@$PACKAGE_VERSION"
          cd gm-skill

          if npm publish --access public 2>&1 | tee /tmp/npm-out.log; then
            echo "✅ Published gm-skill@$PACKAGE_VERSION"
            PUBLISHED=true
          else
            EXIT_CODE=${PIPESTATUS[0]}
            if grep -q "cannot publish over\|previously published\|You cannot publish over the previously published version" /tmp/npm-out.log; then
              echo "⚠️ Version already published, treating as success"
              PUBLISHED=true
            else
              echo "❌ npm publish failed"
              exit $EXIT_CODE
            fi
          fi

          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Trigger 12-platform rebuild
        if: steps.publish.outputs.published == 'true'
        run: |
          echo "Triggering 12-platform rebuild via publish.yml"
          gh workflow run publish.yml -r main --ref main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
