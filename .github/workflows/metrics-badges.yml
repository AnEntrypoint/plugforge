name: Generate Metrics Badges

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-badges:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SVG badges
        shell: bash
        run: |
          python3 << 'PYTHON_EOF'
import os
import json
import subprocess
from datetime import datetime, timedelta

os.makedirs("docs/badges", exist_ok=True)

def generate_svg_badge(label, value):
    width = 200
    height = 20
    x1 = 70
    label_x = x1 // 2
    label_len = x1 - 4
    value_x = x1 + (width - x1) // 2
    value_len = width - x1 - 4

    return f'''<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="{width}" height="{height}" role="img" aria-label="{label}: {value}">
  <title>{label}: {value}</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb"/>
    <stop offset="1" stop-color="#999"/>
  </linearGradient>
  <clipPath id="r">
    <rect width="{width}" height="{height}" rx="3" fill="#fff"/>
  </clipPath>
  <g clip-path="url(#r)">
    <rect width="{x1}" height="{height}" fill="#555"/>
    <rect x="{x1}" width="{width - x1}" height="{height}" fill="#4c1"/>
    <rect width="{width}" height="{height}" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="11">
    <text aria-hidden="true" x="{label_x}" y="15" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="{label_len * 10}">{label}</text>
    <text x="{label_x}" y="14" transform="scale(.1)" fill="#fff" textLength="{label_len * 10}">{label}</text>
    <text aria-hidden="true" x="{value_x}" y="15" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="{value_len * 10}">{value}</text>
    <text x="{value_x}" y="14" transform="scale(.1)" fill="#fff" textLength="{value_len * 10}">{value}</text>
  </g>
</svg>'''

since_date = (datetime.utcnow() - timedelta(days=7)).strftime("%Y-%m-%d")
result = subprocess.run(["git", "log", f"--since={since_date}", "--oneline"], capture_output=True, text=True)
commit_count = len(result.stdout.strip().split('\n')) if result.stdout.strip() else 0

with open("docs/badges/commits-per-week.svg", "w") as f:
    f.write(generate_svg_badge("Commits/Week", str(commit_count)))
print(f"Commits per week: {commit_count}")

repo_url = f"https://api.github.com/repos/{os.environ.get('GITHUB_REPOSITORY', 'AnEntrypoint/gm')}"
repo_response = subprocess.run(
    ["curl", "-s", "-H", "Accept: application/vnd.github+json",
     "-H", f"Authorization: Bearer {os.environ.get('GITHUB_TOKEN', '')}",
     repo_url],
    capture_output=True, text=True
)
issues = json.loads(repo_response.stdout).get("open_issues_count", 0)
with open("docs/badges/open-issues.svg", "w") as f:
    f.write(generate_svg_badge("Open Issues", str(issues)))
print(f"Open issues: {issues}")

result = subprocess.run(["git", "log", "--all", "--format=%an"], capture_output=True, text=True)
contributors = list(set(result.stdout.strip().split('\n')))
bot_patterns = ["dependabot", "github-actions", "renovate", "snyk", "bot"]
filtered = [c for c in contributors if not any(p in c.lower() for p in bot_patterns)]
with open("docs/badges/contributors.svg", "w") as f:
    f.write(generate_svg_badge("Contributors", str(len(filtered))))
print(f"Contributors: {len(filtered)} (from {len(contributors)} total)")

four_weeks_ago = (datetime.utcnow() - timedelta(days=28)).isoformat() + "Z"
prs_url = f"https://api.github.com/repos/{os.environ.get('GITHUB_REPOSITORY', 'AnEntrypoint/gm')}/pulls?state=closed&per_page=100&sort=updated&direction=desc"
prs_response = subprocess.run(
    ["curl", "-s", "-H", "Accept: application/vnd.github+json",
     "-H", f"Authorization: Bearer {os.environ.get('GITHUB_TOKEN', '')}",
     prs_url],
    capture_output=True, text=True
)
prs = json.loads(prs_response.stdout)
merge_times = []
for pr in prs:
    if pr.get("merged_at") and pr["merged_at"] > four_weeks_ago:
        created = datetime.fromisoformat(pr["created_at"].replace("Z", "+00:00"))
        merged = datetime.fromisoformat(pr["merged_at"].replace("Z", "+00:00"))
        diff_days = int((merged - created).total_seconds() / 86400)
        merge_times.append(diff_days)

if merge_times:
    avg_time = sum(merge_times) // len(merge_times)
    label_value = f"{avg_time}d"
else:
    label_value = "N/A"

with open("docs/badges/pr-merge-time.svg", "w") as f:
    f.write(generate_svg_badge("Avg Merge Time", label_value))
print(f"Avg PR merge time: {label_value}")
PYTHON_EOF

      - name: Update README with badges
        shell: bash
        run: |
          python3 << 'PYTHON_EOF'
import re

readme_file = "README.md"
with open(readme_file, "r") as f:
    content = f.read()

metrics_section = """## Metrics

[![Commits per week](../../docs/badges/commits-per-week.svg)](../../docs/badges/commits-per-week.svg)
[![Open Issues](../../docs/badges/open-issues.svg)](../../docs/badges/open-issues.svg)
[![Contributors](../../docs/badges/contributors.svg)](../../docs/badges/contributors.svg)
[![Avg PR Merge Time](../../docs/badges/pr-merge-time.svg)](../../docs/badges/pr-merge-time.svg)
"""

if "## Metrics" in content:
    content = re.sub(r"## Metrics\n\n.*?\n(?=##|\Z)", metrics_section + "\n", content, flags=re.DOTALL)
else:
    lines = content.split('\n')
    inserted = False
    new_lines = []
    for line in lines:
        if line.startswith("## ") and not inserted:
            new_lines.append(metrics_section)
            new_lines.append("")
            inserted = True
        new_lines.append(line)
    if not inserted:
        new_lines.append("")
        new_lines.append(metrics_section)
    content = '\n'.join(new_lines)

with open(readme_file, "w") as f:
    f.write(content)
print("README updated with badges")
PYTHON_EOF

      - name: Check for changes and commit
        shell: bash
        run: |
          if git diff --quiet docs/badges/ README.md 2>/dev/null; then
            echo "No changes detected"
          else
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add docs/badges/ README.md
            git commit -m "chore: update metrics badges"
            git push
            echo "Changes pushed"
          fi
