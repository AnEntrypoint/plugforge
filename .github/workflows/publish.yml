name: Build & Publish Plugins

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.gitignore', 'CHANGELOG.md', '.gm/**']
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Auto-bump version if needed
        run: |
          # Get the highest published version across all CLI packages
          MAX_NPM="0.0.0"
          for PKG in gm-cc gm-gc gm-oc gm-kilo gm-codex gm-qwen gm-copilot-cli gm-hermes gm-antigravity gm-thebird; do
            V=$(npm view "$PKG" version 2>/dev/null || echo "0.0.0")
            MAX_NPM=$(printf '%s\n' "$V" "$MAX_NPM" | sort -V | tail -1)
          done
          NPM_VERSION="$MAX_NPM"
          CURRENT_VERSION=$(jq -r '.version' gm-starter/gm.json)

          echo "npm max across all packages: $NPM_VERSION"
          echo "current: $CURRENT_VERSION"

          # Parse versions
          IFS='.' read -r NPM_MAJOR NPM_MINOR NPM_PATCH <<< "$NPM_VERSION"
          IFS='.' read -r CURR_MAJOR CURR_MINOR CURR_PATCH <<< "$CURRENT_VERSION"

          # If npm version >= current, bump patch
          if [ "$NPM_MAJOR" -gt "$CURR_MAJOR" ] || \
             ([ "$NPM_MAJOR" -eq "$CURR_MAJOR" ] && [ "$NPM_MINOR" -gt "$CURR_MINOR" ]) || \
             ([ "$NPM_MAJOR" -eq "$CURR_MAJOR" ] && [ "$NPM_MINOR" -eq "$CURR_MINOR" ] && [ "$NPM_PATCH" -ge "$CURR_PATCH" ]); then
            NEW_PATCH=$((NPM_PATCH + 1))
            NEW_VERSION="$NPM_MAJOR.$NPM_MINOR.$NEW_PATCH"
            echo "Bumping version from $CURRENT_VERSION to $NEW_VERSION"
            jq --arg v "$NEW_VERSION" '.version = $v' gm-starter/gm.json > /tmp/gm.json.tmp
            mv /tmp/gm.json.tmp gm-starter/gm.json

            git config --global user.email "noreply@github.com"
            git config --global user.name "gm-bot"
            git add gm-starter/gm.json
            git commit -m "chore: auto-bump version to $NEW_VERSION [skip ci]"
            for i in 1 2 3 4 5; do
              if git push origin main; then
                echo "Version bumped and pushed (attempt $i)"
                break
              fi
              echo "Push attempt $i failed; rebasing"
              git pull --rebase origin main || true
              if [ "$i" -eq 5 ]; then
                echo "All push attempts exhausted" >&2
                exit 1
              fi
            done
          else
            echo "No version bump needed"
          fi

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.version' gm-starter/gm.json)" >> $GITHUB_OUTPUT

  build-and-publish:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {platform: cc, name: "Claude Code"}
          - {platform: gc, name: "Gemini CLI"}
          - {platform: oc, name: "OpenCode"}
          - {platform: vscode, name: "VS Code"}
          - {platform: cursor, name: "Cursor"}
          - {platform: codex, name: "Codex"}
          - {platform: kilo, name: "Kilo CLI"}
          - {platform: zed, name: "Zed"}
          - {platform: jetbrains, name: "JetBrains"}
          - {platform: qwen, name: "Qwen Code"}
          - {platform: copilot-cli, name: "GitHub Copilot CLI"}
          - {platform: hermes, name: "Hermes Agent"}
          - {platform: antigravity, name: "Antigravity"}
          - {platform: windsurf, name: "Windsurf"}
          - {platform: thebird, name: "thebird"}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build ${{ matrix.name }}
        run: node cli.js gm-starter ./build

      - name: Validate build output
        run: |
          BUILD_DIR="./build/gm-${{ matrix.platform }}"
          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ Build failed: $BUILD_DIR does not exist"
            exit 1
          fi
          echo "✅ Build output validated at $BUILD_DIR"

      - name: Setup Git
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
        run: |
          git config --global user.email "noreply@github.com"
          git config --global user.name "gm-bot"
          git config --global url."https://${GH_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

      - name: Publish to GitHub
        env:
          GH_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
          PLATFORM: ${{ matrix.platform }}
          NAME: ${{ matrix.name }}
        run: |
          set -e
          REPO_NAME="gm-${PLATFORM}"
          WORK_DIR="/tmp/${REPO_NAME}"
          BUILD_DIR="./build/gm-${PLATFORM}"
          SOURCE_ROOT="${GITHUB_WORKSPACE}"

          # Ensure build directory exists and has content
          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ Build directory not found: $BUILD_DIR"
            exit 1
          fi

          gh repo create AnEntrypoint/${REPO_NAME} --public 2>/dev/null || true

          gh api -X POST "repos/AnEntrypoint/${REPO_NAME}/pages" \
            -f "build_type=workflow" 2>/dev/null \
            || gh api -X PUT "repos/AnEntrypoint/${REPO_NAME}/pages" \
                 -f "build_type=workflow" 2>/dev/null \
            || true

          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"
          cd "$WORK_DIR"

          PREBUILT_BIN="${SOURCE_ROOT}/gm-build-latest/gm-${PLATFORM}/bin"
          mkdir -p "${SOURCE_ROOT}/${BUILD_DIR}/bin"
          if [ -d "$PREBUILT_BIN" ]; then
            for f in plugkit.version plugkit.sha256; do
              if [ -f "$PREBUILT_BIN/$f" ]; then
                cp -a "$PREBUILT_BIN/$f" "${SOURCE_ROOT}/${BUILD_DIR}/bin/$f"
              fi
            done
            echo "✅ Copied plugkit metadata (version+sha256) from $PREBUILT_BIN — native binaries are fetched at runtime by bin/bootstrap.js"
          fi
          if [ ! -f "${SOURCE_ROOT}/${BUILD_DIR}/bin/plugkit.version" ]; then
            PV=$(jq -r '.plugkitVersion // empty' "${SOURCE_ROOT}/gm-starter/gm.json")
            if [ -n "$PV" ]; then
              echo "$PV" > "${SOURCE_ROOT}/${BUILD_DIR}/bin/plugkit.version"
              echo "✅ Wrote plugkit.version=$PV from gm.json (no PREBUILT_BIN/plugkit.version)"
            fi
          fi

          REMOTE_HEAD=$(git ls-remote "https://github.com/AnEntrypoint/${REPO_NAME}.git" main 2>/dev/null | awk '{print $1}' || true)
          NEED_COMPARE=0
          if [ -n "$REMOTE_HEAD" ]; then
            git clone --depth 1 "https://github.com/AnEntrypoint/${REPO_NAME}.git" compare-src 2>/dev/null && NEED_COMPARE=1 || true
          fi

          git init -q --initial-branch=main fresh
          cd fresh
          git remote add origin "https://github.com/AnEntrypoint/${REPO_NAME}.git"
          rsync -a --exclude='.git' --no-times "${SOURCE_ROOT}/${BUILD_DIR}"/ ./

          CHANGED=1
          if [ "$NEED_COMPARE" = "1" ]; then
            if diff -rq --no-dereference ../compare-src ./ \
                 --exclude='.git' >/dev/null 2>&1; then
              CHANGED=0
            fi
          fi

          if [ "$CHANGED" = "0" ]; then
            echo "✅ No changes to publish for $NAME"
            exit 0
          fi

          git add -A
          if [ -d bin ]; then git add -f bin/; fi
          git commit -q -m "Auto-build: ${NAME} plugin from gm (v${{ needs.prepare.outputs.version }})"
          git push --force origin main
          echo "✅ Force-pushed single-commit history to $REPO_NAME"

      - name: Publish to npm
        if: matrix.platform == 'oc' || matrix.platform == 'kilo' || matrix.platform == 'qwen' || matrix.platform == 'hermes' || matrix.platform == 'antigravity' || matrix.platform == 'codex' || matrix.platform == 'thebird'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          BUILD_DIR="./build/gm-${{ matrix.platform }}"
          VERSION="${{ needs.prepare.outputs.version }}"

          # Update version in build output package.json
          cd "$BUILD_DIR"
          jq --arg v "$VERSION" '.version = $v' package.json > /tmp/pkg.json.tmp
          mv /tmp/pkg.json.tmp package.json

          # Set npm auth
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc

          # Publish (tolerate already-published-version error)
          npm publish . --access public 2>&1 | tee /tmp/npm-out.log; EXIT=${PIPESTATUS[0]}
          if [ "$EXIT" != "0" ]; then
            if grep -q "cannot publish over\|previously published" /tmp/npm-out.log; then
              echo "⚠️  Version already published, skipping"
            else
              exit "$EXIT"
            fi
          fi
          echo "✅ Published gm-${{ matrix.platform }}@${VERSION} to npm"
